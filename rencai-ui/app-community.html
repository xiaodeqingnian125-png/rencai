<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>晓得青年 · 加入社群</title>
<style>
/* ═══════════════════════════════════════════════════════════════════
   Warm Community palette — shared tokens
   ═══════════════════════════════════════════════════════════════════ */
:root {
  --bg: #fafaf6;
  --surface: #fffdf7;
  --surface-warm: #fef8ef;
  --fg: #2d2318;
  --fg-2: #5c4a38;
  --muted: #8c7a68;
  --meta: #a69682;
  --border: #e8e0d4;
  --border-soft: #f0eae0;
  --accent: #e8723c;
  --accent-on: #ffffff;
  --accent-hover: #f0804a;
  --accent-active: #d4622c;

  --font-display: "SF Pro Display", "PingFang SC", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
  --font-body: "PingFang SC", "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
  --font-mono: "SF Mono", ui-monospace, "JetBrains Mono", Menlo, Monaco, Consolas, monospace;

  --text-xs: 12px;
  --text-sm: 14px;
  --text-base: 16px;
  --text-lg: 21px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --radius-pill: 980px;

  --elev-raised: 0 12px 32px rgba(0,0,0,0.06);
  --ease-standard: cubic-bezier(0.28, 0, 0.22, 1);
  --motion-fast: 150ms;
  --motion-base: 220ms;

  --price-orange: #e8590c;
  --community-green: #5b9a6f;
  --map-blue: #5b8cb8;
  --guide-plum: #9b7eb8;
  --badge-red: #e04a3a;

  --device-bg: #d8d0c4;
  --phone-bezel: #0a0a0a;
  --phone-inner: #0a0a0a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  display: grid; place-items: center;
  min-height: 100vh;
  background: var(--device-bg);
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--fg);
  -webkit-font-smoothing: antialiased;
}

.phone-frame {
  width: 390px; min-width: 390px;
  height: 844px;
  background: var(--phone-bezel);
  border-radius: 50px;
  padding: 14px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25), 0 4px 16px rgba(0,0,0,0.1);
  flex-shrink: 0;
}
.phone-screen {
  width: 100%; height: 100%;
  background: var(--bg);
  border-radius: 38px;
  overflow: hidden;
  display: flex; flex-direction: column;
  position: relative;
}
.dynamic-island {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  width: 126px; height: 34px;
  background: var(--phone-inner); border-radius: 20px;
  z-index: 100;
}

.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 28px 0;
  height: 50px;
  font-size: 14px; font-weight: 600;
  color: var(--fg);
}
.status-time { flex: 1; }
.status-icons { display: flex; align-items: center; gap: 6px; }
.status-icons svg { width: 16px; height: 16px; }

.mp-nav {
  display: flex; align-items: center;
  height: 44px; padding: 0 12px;
  flex-shrink: 0;
  position: relative;
}
.mp-nav-back {
  width: 32px; height: 32px;
  display: grid; place-items: center;
  border-radius: 50%;
  cursor: pointer;
  transition: background var(--motion-fast) var(--ease-standard);
  flex-shrink: 0;
}
.mp-nav-back:active { background: var(--surface); }
.mp-nav-back svg { width: 22px; height: 22px; color: var(--fg); }
.mp-nav-title {
  flex: 1; text-align: center;
  font-family: var(--font-display);
  font-size: 17px; font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--fg);
  margin-right: 32px;
}

.mp-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
  padding-bottom: 8px;
}
.mp-scroll::-webkit-scrollbar { width: 0; }

/* ═════════════════════════════════════════════════════════════════
   QR Code Card
   ═════════════════════════════════════════════════════════════════ */
.qr-section {
  padding: 24px 16px 16px;
}
.qr-card {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-lg);
  padding: 32px 24px;
  text-align: center;
}
.qr-code {
  width: 200px; height: 200px;
  margin: 0 auto 20px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  display: grid; place-items: center;
  position: relative;
  overflow: hidden;
}
/* Simulated QR pattern */
.qr-pattern {
  display: grid;
  grid-template-columns: repeat(25, 1fr);
  gap: 0;
  width: 160px; height: 160px;
}
.qr-dot {
  aspect-ratio: 1;
  background: var(--fg);
  border-radius: 1px;
}
.qr-dot.empty { background: transparent; }
/* QR corner finder squares */
.qr-finder {
  position: absolute;
  width: 36px; height: 36px;
  border: 6px solid var(--fg);
  border-radius: 4px;
}
.qr-ftl { top: 10px; left: 10px; }
.qr-ftr { top: 10px; right: 10px; }
.qr-fbl { bottom: 10px; left: 10px; }
/* Center icon */
.qr-icon {
  position: absolute;
  width: 40px; height: 40px;
  border-radius: var(--radius-sm);
  background: var(--accent);
  color: var(--accent-on);
  display: grid; place-items: center;
  font-size: 20px;
  font-weight: 700;
  box-shadow: 0 0 0 6px var(--bg);
}

.qr-title {
  font-family: var(--font-display);
  font-size: 20px; font-weight: 600;
  letter-spacing: -0.01em;
  margin-bottom: 8px;
}
.qr-sub {
  font-size: 14px; color: var(--muted);
  line-height: 1.5;
  margin-bottom: 6px;
}
.qr-hint {
  font-size: 13px; color: var(--accent);
  font-weight: 500;
}

/* ═════════════════════════════════════════════════════════════════
   Action Buttons
   ═════════════════════════════════════════════════════════════════ */
.actions {
  padding: 8px 16px 16px;
  display: flex; flex-direction: column; gap: 10px;
}
.btn-save {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%;
  padding: 14px 0;
  background: var(--accent);
  color: var(--accent-on);
  border: none;
  border-radius: var(--radius-md);
  font-size: 16px; font-weight: 600;
  cursor: pointer;
  transition: opacity var(--motion-fast) var(--ease-standard);
  user-select: none;
}
.btn-save:active { opacity: 0.85; }
.btn-save svg { width: 18px; height: 18px; }

.btn-outline {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%;
  padding: 14px 0;
  background: transparent;
  color: var(--accent);
  border: 1.5px solid var(--accent);
  border-radius: var(--radius-md);
  font-size: 16px; font-weight: 600;
  cursor: pointer;
  transition: all var(--motion-fast) var(--ease-standard);
  user-select: none;
}
.btn-outline:active { background: color-mix(in oklab, var(--accent) 8%, transparent); }
.btn-outline svg { width: 18px; height: 18px; }

/* ═════════════════════════════════════════════════════════════════
   Community Benefits
   ═════════════════════════════════════════════════════════════════ */
.benefits {
  padding: 8px 16px 24px;
}
.benefits-title {
  font-size: 13px; font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 10px;
}
.benefit-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-soft);
}
.benefit-row:last-child { border-bottom: none; }
.benefit-check {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: color-mix(in oklab, var(--community-green) 12%, transparent);
  color: var(--community-green);
  display: grid; place-items: center;
  flex-shrink: 0;
}
.benefit-check svg { width: 16px; height: 16px; }
.benefit-text { flex: 1; font-size: 15px; }
.benefit-tag {
  font-size: 12px; color: var(--muted);
  flex-shrink: 0;
}

.home-indicator {
  width: 134px; height: 5px;
  background: var(--fg);
  border-radius: 3px;
  margin: 8px auto;
  opacity: 0.2;
}

.toast {
  position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
  background: var(--fg); color: var(--bg);
  padding: 10px 20px;
  border-radius: var(--radius-pill);
  font-size: 14px; font-weight: 500;
  opacity: 0; pointer-events: none;
  transition: opacity var(--motion-base) var(--ease-standard);
  z-index: 200;
  white-space: nowrap;
}
.toast.show { opacity: 1; }

@media (max-width: 430px) {
  body { background: var(--bg); align-items: flex-start; }
  .phone-frame { width: 100vw; height: 100vh; height: 100dvh; min-width: unset; border-radius: 0; padding: 0; box-shadow: none; }
  .phone-screen { border-radius: 0; }
  .dynamic-island { display: none; }
  .status-bar { padding: 12px 20px 0; height: 44px; }
}
</style>
</head>
<body>

<div class="phone-frame">
  <div class="phone-screen">

    <div class="dynamic-island"></div>

    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <svg viewBox="0 0 16 12" fill="currentColor"><rect x="0" y="7" width="2" height="4" rx="0.5"/><rect x="3" y="5" width="2" height="6" rx="0.5"/><rect x="6" y="2" width="2" height="9" rx="0.5"/><rect x="9" y="0" width="2" height="11" rx="0.5"/></svg>
        <svg viewBox="0 0 18 12" fill="currentColor"><path d="M1 3.5h1.5L3.5 8h11l1-4.5H16a1 1 0 011 1v6a1 1 0 01-1 1H2a1 1 0 01-1-1v-6a1 1 0 011-1z"/><rect x="4" y="8.5" width="10" height="1.5" rx="0.5"/></svg>
        <svg viewBox="0 0 28 12" fill="currentColor"><rect x="0" y="0" width="24" height="12" rx="2.5" stroke="currentColor" fill="none" stroke-width="1"/><rect x="2" y="2" width="18" height="8" rx="1"/><rect x="25" y="3" width="2" height="6" rx="0.8"/></svg>
      </div>
    </div>

    <div class="mp-nav">
      <div class="mp-nav-back" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </div>
      <span class="mp-nav-title">加入社群</span>
    </div>

    <div class="mp-scroll" data-od-id="community-scroll">

      <!-- QR Code -->
      <div class="qr-section" data-od-id="qr-section">
        <div class="qr-card">
          <div class="qr-code" id="qrCode">
            <div class="qr-finder qr-ftl"></div>
            <div class="qr-finder qr-ftr"></div>
            <div class="qr-finder qr-fbl"></div>
            <div id="qrGrid" class="qr-pattern"></div>
            <div class="qr-icon">小</div>
          </div>
          <div class="qr-title">扫码添加晓得助理</div>
          <div class="qr-sub">长按识别二维码，添加助理微信<br>拉你进对应公寓社群</div>
          <div class="qr-hint">添加时请备注：所在公寓名，方便拉你进对应社群</div>
        </div>
      </div>

      <!-- Actions -->
      <div class="actions" data-od-id="community-actions">
        <button class="btn-save" onclick="showToast('二维码已保存到相册')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><path d="M12 15V3"/></svg>
          保存二维码图片
        </button>
        <button class="btn-outline" onclick="showToast('已复制微信号')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          复制微信号
        </button>
      </div>

      <!-- Benefits -->
      <div class="benefits" data-od-id="community-benefits">
        <div class="benefits-title">加入社群你可以</div>
        <div class="benefit-row">
          <div class="benefit-check">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <span class="benefit-text">实时获取人才公寓最新房源动态</span>
          <span class="benefit-tag">每日更新</span>
        </div>
        <div class="benefit-row">
          <div class="benefit-check">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <span class="benefit-text">和同公寓的邻居聊生活、约活动</span>
          <span class="benefit-tag">邻居互动</span>
        </div>
        <div class="benefit-row">
          <div class="benefit-check">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <span class="benefit-text">活动优先报名 + 专属优惠通知</span>
          <span class="benefit-tag">优先名额</span>
        </div>
        <div class="benefit-row">
          <div class="benefit-check">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <span class="benefit-text">二手闲置交换 + 寻室友 + 借工具</span>
          <span class="benefit-tag">社区互助</span>
        </div>
      </div>

    </div>

    <div class="home-indicator"></div>
    <div class="toast" id="toast"></div>
  </div>
</div>

<script>
// ─── QR Code dots ──────────────────────────────────────────────
(function() {
  var grid = document.getElementById('qrGrid');
  var size = 25;
  var html = '';
  for (var r = 0; r < size; r++) {
    for (var c = 0; c < size; c++) {
      // Skip the three finder squares (7x7 each at corners) and center icon area
      var inFinder = (r < 8 && c < 8) || (r < 8 && c > size - 9) || (r > size - 9 && c < 8);
      var inCenter = (r >= size/2-2 && r <= size/2+1 && c >= size/2-2 && c <= size/2+1);
      if (inFinder || inCenter) { html += '<div class="qr-dot empty"></div>'; continue; }
      // Pseudo-random pattern
      var on = (r * 7 + c * 13 + r * c) % 5 < 2;
      html += '<div class="qr-dot' + (on ? '' : ' empty') + '"></div>';
    }
  }
  grid.innerHTML = html;
})();

var toastTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 1800);
}
</script>

</body>
</html>
