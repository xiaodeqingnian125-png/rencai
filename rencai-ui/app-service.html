<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>晓得青年 · 服务</title>
<style>
/* ═══════════════════════════════════════════════════════════════════════
   Warm Community palette — shared tokens
   ═══════════════════════════════════════════════════════════════════════ */
:root {
  --bg: #fafaf6;
  --surface: #fffdf7;
  --surface-warm: #fef8ef;
  --fg: #2d2318;
  --fg-2: #5c4a38;
  --muted: #8c7a68;
  --meta: #a69682;
  --border: #e8e0d4;
  --border-soft: #f0eae0;
  --accent: #e8723c;
  --accent-on: #ffffff;
  --accent-hover: #f0804a;
  --accent-active: #d4622c;

  --font-display: "SF Pro Display", "PingFang SC", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
  --font-body: "PingFang SC", "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
  --font-mono: "SF Mono", ui-monospace, "JetBrains Mono", Menlo, Monaco, Consolas, monospace;

  --text-xs: 12px;
  --text-sm: 14px;
  --text-base: 16px;
  --text-lg: 21px;

  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;

  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --radius-pill: 980px;

  --elev-raised: 0 12px 32px rgba(0,0,0,0.06);
  --ease-standard: cubic-bezier(0.28, 0, 0.22, 1);
  --motion-fast: 150ms;
  --motion-base: 220ms;

  /* Semantic */
  --price-orange: #e8590c;
  --community-green: #5b9a6f;
  --map-blue: #5b8cb8;
  --guide-plum: #9b7eb8;
  --badge-red: #e04a3a;

  /* Device frame */
  --device-bg: #d8d0c4;
  --phone-bezel: #0a0a0a;
  --phone-inner: #0a0a0a;
}

/* ═══════════════════════════════════════════════════════════════════════
   Reset & Base
   ═══════════════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  display: grid; place-items: center;
  min-height: 100vh;
  background: var(--device-bg);
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--fg);
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════════════════════════════════
   Phone Frame
   ═══════════════════════════════════════════════════════════════════════ */
.phone-frame {
  width: 390px; min-width: 390px;
  height: 844px;
  background: var(--phone-bezel);
  border-radius: 50px;
  padding: 14px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25), 0 4px 16px rgba(0,0,0,0.1);
  flex-shrink: 0;
}
.phone-screen {
  width: 100%; height: 100%;
  background: var(--bg);
  border-radius: 38px;
  overflow: hidden;
  display: flex; flex-direction: column;
  position: relative;
}
.dynamic-island {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  width: 126px; height: 34px;
  background: var(--phone-inner); border-radius: 20px;
  z-index: 100;
}

/* ═══════════════════════════════════════════════════════════════════════
   Status Bar
   ═══════════════════════════════════════════════════════════════════════ */
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 28px 0;
  height: 50px;
  font-size: 14px; font-weight: 600;
  color: var(--fg);
}
.status-time { flex: 1; }
.status-icons { display: flex; align-items: center; gap: 6px; }
.status-icons svg { width: 16px; height: 16px; }

/* ═══════════════════════════════════════════════════════════════════════
   Nav Bar
   ═══════════════════════════════════════════════════════════════════════ */
.mp-nav {
  display: flex; align-items: center; justify-content: center;
  height: 44px; padding: 0 16px;
  position: relative;
  flex-shrink: 0;
}
.mp-nav-title {
  font-family: var(--font-display);
  font-size: 17px; font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--fg);
}
.mp-nav-dots {
  position: absolute; right: 16px;
  width: 32px; height: 32px;
  display: grid; place-items: center;
  border-radius: 50%;
  cursor: pointer;
  transition: background var(--motion-fast) var(--ease-standard);
}
.mp-nav-dots:active { background: var(--surface); }
.mp-nav-dots svg { width: 20px; height: 20px; color: var(--fg); }

/* ═══════════════════════════════════════════════════════════════════════
   Scroll Area
   ═══════════════════════════════════════════════════════════════════════ */
.mp-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
  padding-bottom: 8px;
}
.mp-scroll::-webkit-scrollbar { width: 0; }

/* ═══════════════════════════════════════════════════════════════════════
   Section Header
   ═══════════════════════════════════════════════════════════════════════ */
.section-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 16px 10px;
}
.section-hd-title {
  font-family: var(--font-display);
  font-size: 19px; font-weight: 600;
  letter-spacing: -0.01em;
}
.section-hd-more {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 14px; font-weight: 500;
  color: var(--accent);
  cursor: pointer;
  user-select: none;
  transition: opacity var(--motion-fast) var(--ease-standard);
}
.section-hd-more:active { opacity: 0.7; }
.section-hd-more svg { width: 14px; height: 14px; }

/* ═══════════════════════════════════════════════════════════════════════
   Activity Cards
   ═══════════════════════════════════════════════════════════════════════ */
.activity-list {
  display: flex; flex-direction: column; gap: 12px;
  padding: 0 16px;
}
.activity-card {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: transform var(--motion-fast) var(--ease-standard),
              box-shadow var(--motion-fast) var(--ease-standard);
  user-select: none;
}
.activity-card:active { transform: scale(0.985); }
.activity-cover {
  width: 100%; aspect-ratio: 2.4 / 1;
  position: relative;
  overflow: hidden;
}
.activity-cover-bg {
  width: 100%; height: 100%;
}
.activity-badge {
  position: absolute; top: 10px; left: 10px;
  padding: 3px 10px;
  border-radius: var(--radius-pill);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.02em;
}
.badge-official { background: var(--accent); color: var(--accent-on); }
.badge-user    { background: var(--community-green); color: #fff; }
.activity-body { padding: 14px 16px; }
.activity-title {
  font-family: var(--font-display);
  font-size: 17px; font-weight: 600;
  letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.activity-meta {
  display: flex; flex-wrap: wrap; gap: 6px 16px;
}
.activity-meta-item {
  display: flex; align-items: center; gap: 4px;
  font-size: 13px; color: var(--muted);
}
.activity-meta-item svg { width: 14px; height: 14px; flex-shrink: 0; color: var(--meta); }
.activity-status {
  margin-top: 8px;
  font-size: 12px; font-weight: 600;
}
.status-open { color: var(--community-green); }
.status-full  { color: var(--muted); }
.status-review { color: var(--accent); }

.review-queue {
  display: none;
  margin: 12px 16px 0;
  padding: 14px;
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-lg);
  background: color-mix(in oklab, var(--accent) 5%, var(--bg));
}
.review-queue.show { display: block; }
.review-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.review-title {
  font-size: 14px; font-weight: 700;
  color: var(--fg);
}
.review-count {
  font-size: 11px; font-weight: 700;
  color: var(--accent);
  background: color-mix(in oklab, var(--accent) 10%, transparent);
  border-radius: var(--radius-pill);
  padding: 3px 8px;
}
.review-item {
  padding: 10px 0;
  border-top: 1px solid var(--border-soft);
}
.review-item:first-of-type { border-top: 0; padding-top: 0; }
.review-name {
  font-size: 15px; font-weight: 700;
  margin-bottom: 4px;
}
.review-meta {
  font-size: 12px; color: var(--muted);
  line-height: 1.5;
}

/* Activity cover gradients */
.cover-grad-1 { background: linear-gradient(135deg, #f5e8d8 0%, #e8d4b8 40%, #dcc8a0 100%); }
.cover-grad-2 { background: linear-gradient(135deg, #e8f0e8 0%, #d0e0d0 40%, #bcd0bc 100%); }
.cover-grad-3 { background: linear-gradient(135deg, #f0e8f0 0%, #ddd0e0 40%, #cbc0d0 100%); }

/* ═══════════════════════════════════════════════════════════════════════
   Launch Activity Button
   ═══════════════════════════════════════════════════════════════════════ */
.launch-btn-area {
  padding: 12px 16px 0;
}
.btn-launch {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%;
  padding: 13px 0;
  background: transparent;
  border: 1.5px dashed var(--border);
  border-radius: var(--radius-md);
  font-size: 15px; font-weight: 500;
  color: var(--accent);
  cursor: pointer;
  transition: all var(--motion-fast) var(--ease-standard);
  user-select: none;
}
.btn-launch:active {
  border-color: var(--accent);
  background: color-mix(in oklab, var(--accent) 4%, transparent);
}
.btn-launch svg { width: 18px; height: 18px; }

/* ═══════════════════════════════════════════════════════════════════════
   Service (代办) Cards
   ═══════════════════════════════════════════════════════════════════════ */
.service-list {
  display: flex; flex-direction: column; gap: 10px;
  padding: 0 16px;
}
.service-card {
  display: flex; align-items: center; gap: 14px;
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  cursor: pointer;
  transition: transform var(--motion-fast) var(--ease-standard),
              box-shadow var(--motion-fast) var(--ease-standard);
  user-select: none;
}
.service-card:active { transform: scale(0.985); }
.service-icon {
  width: 44px; height: 44px;
  border-radius: var(--radius-sm);
  display: grid; place-items: center;
  flex-shrink: 0;
  background: color-mix(in oklab, var(--accent) 10%, transparent);
  color: var(--accent);
}
.service-icon svg { width: 24px; height: 24px; }
.service-info { flex: 1; min-width: 0; }
.service-name {
  font-size: 16px; font-weight: 600;
  letter-spacing: -0.005em;
  margin-bottom: 2px;
}
.service-desc {
  font-size: 13px; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.service-price {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 600;
  color: var(--price-orange);
  flex-shrink: 0;
}
.service-price .unit {
  font-size: 12px; font-weight: 400;
  color: var(--muted);
}

/* Full list filters */
.list-filter-panel {
  display: grid;
  gap: 12px;
  margin-bottom: 14px;
}
.filter-group {
  display: grid;
  gap: 8px;
}
.filter-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
}
.filter-chips {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 2px;
}
.filter-chips::-webkit-scrollbar { width: 0; height: 0; }
.filter-chip {
  flex: 0 0 auto;
  border: 1px solid var(--border);
  border-radius: var(--radius-pill);
  background: var(--bg);
  color: var(--fg-2);
  padding: 7px 12px;
  font: 700 13px var(--font-body);
  cursor: pointer;
}
.filter-chip.active {
  border-color: var(--accent);
  background: color-mix(in oklab, var(--accent) 9%, var(--bg));
  color: var(--accent);
}
.full-list {
  display: grid;
  gap: 10px;
}
.full-list-item {
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-lg);
  background: var(--bg);
  padding: 13px;
  cursor: pointer;
}
.full-list-top {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
  margin-bottom: 6px;
}
.full-list-title {
  font-size: 16px;
  font-weight: 800;
  line-height: 1.3;
}
.full-list-tag {
  flex: 0 0 auto;
  border-radius: var(--radius-pill);
  background: var(--surface-warm);
  color: var(--fg-2);
  padding: 4px 8px;
  font-size: 11px;
  font-weight: 700;
}
.full-list-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 12px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.5;
}
.full-list-desc {
  margin-top: 8px;
  color: var(--fg-2);
  font-size: 13px;
  line-height: 1.5;
}

/* ═══════════════════════════════════════════════════════════════════════
   Empty State
   ═══════════════════════════════════════════════════════════════════════ */
.empty-state {
  text-align: center; padding: 36px 20px 28px;
  color: var(--muted);
}
.empty-state svg { width: 44px; height: 44px; color: var(--border); margin-bottom: 12px; }
.empty-state p { font-size: 14px; line-height: 1.5; }

/* Divider between sections */
.section-divider {
  height: 6px;
  background: var(--surface);
  border-top: 1px solid var(--border-soft);
  border-bottom: 1px solid var(--border-soft);
  margin: 20px 0 0;
}

/* ═══════════════════════════════════════════════════════════════════════
   TabBar
   ═══════════════════════════════════════════════════════════════════════ */
.mp-tabbar {
  display: flex; align-items: flex-start;
  padding: 6px 4px 0;
  background: color-mix(in oklab, var(--bg) 92%, transparent);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border-soft);
  flex-shrink: 0;
  position: relative;
}
.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 6px 0 8px;
  cursor: pointer;
  transition: color var(--motion-fast) var(--ease-standard);
  user-select: none;
  color: var(--meta);
}
.tab-item.active { color: var(--accent); }
.tab-item svg { width: 24px; height: 24px; }
.tab-label { font-size: 10px; font-weight: 500; letter-spacing: 0.01em; }
.tab-badge {
  position: absolute; top: 2px; right: 50%; transform: translateX(18px);
  min-width: 8px; height: 8px;
  background: var(--badge-red); border-radius: 50%;
  border: 2px solid var(--bg);
}

/* Home indicator */
.home-indicator {
  width: 134px; height: 5px;
  background: var(--fg);
  border-radius: 3px;
  margin: 8px auto;
  opacity: 0.2;
}

/* Toast */
.toast {
  position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
  background: var(--fg); color: var(--bg);
  padding: 10px 20px;
  border-radius: var(--radius-pill);
  font-size: 14px; font-weight: 500;
  opacity: 0; pointer-events: none;
  transition: opacity var(--motion-base) var(--ease-standard);
  z-index: 200;
  white-space: nowrap;
}
.toast.show { opacity: 1; }

/* Modal sheets */
.modal-mask {
  position: absolute; inset: 0;
  background: rgba(45,35,24,0.28);
  opacity: 0; pointer-events: none;
  transition: opacity var(--motion-base) var(--ease-standard);
  z-index: 160;
}
.modal-mask.show { opacity: 1; pointer-events: auto; }
.sheet {
  position: absolute; left: 0; right: 0; bottom: 0;
  max-height: 84%; overflow-y: auto;
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  padding: 18px 18px 24px;
  transform: translateY(100%);
  transition: transform var(--motion-base) var(--ease-standard);
  box-shadow: 0 -12px 32px rgba(45,35,24,0.16);
  z-index: 170;
}
.sheet.show { transform: translateY(0); }
.sheet-hd { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
.sheet-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
.sheet-close { width: 32px; height: 32px; border: 0; border-radius: 50%; background: var(--surface-warm); color: var(--fg); display: grid; place-items: center; cursor: pointer; }
.sheet-close svg { width: 18px; height: 18px; }
.detail-panel { border: 1px solid var(--border-soft); border-radius: var(--radius-lg); background: var(--bg); padding: 14px; margin-bottom: 12px; }
.detail-panel h3 { font-size: 18px; margin-bottom: 8px; }
.detail-panel p { font-size: 14px; color: var(--muted); line-height: 1.55; }
.detail-list { display: grid; gap: 8px; margin-top: 10px; }
.detail-row { display: flex; justify-content: space-between; gap: 12px; padding: 9px 0; border-top: 1px solid var(--border-soft); font-size: 14px; }
.detail-row span:first-child { color: var(--muted); }
.detail-row span:last-child { color: var(--fg); text-align: right; }
.form-grid { display: grid; gap: 10px; }
.field { display: grid; gap: 6px; }
.field label { font-size: 13px; font-weight: 600; color: var(--fg-2); }
.field input, .field select, .field textarea {
  width: 100%; border: 1px solid var(--border); border-radius: var(--radius-md);
  background: var(--bg); color: var(--fg); font: 14px var(--font-body);
  padding: 11px 12px; outline: 0;
}
.field textarea { min-height: 72px; resize: vertical; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent), transparent 86%); }
.check-card {
  display: flex; align-items: flex-start; gap: 10px;
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-md);
  background: var(--bg);
  padding: 11px 12px;
  font-size: 13px;
  line-height: 1.45;
  color: var(--fg-2);
}
.check-card input {
  width: 18px; height: 18px; margin-top: 1px;
  accent-color: var(--accent);
  flex-shrink: 0;
}
.hint-card {
  display: flex; gap: 10px;
  border: 1px solid color-mix(in oklab, var(--accent) 18%, var(--border-soft));
  border-radius: var(--radius-md);
  background: color-mix(in oklab, var(--accent) 6%, var(--bg));
  padding: 11px 12px;
  color: var(--fg-2);
  font-size: 13px;
  line-height: 1.5;
}
.hint-card svg { width: 18px; height: 18px; color: var(--accent); flex-shrink: 0; margin-top: 1px; }
.segmented {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.segmented label,
.cover-option {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  min-height: 38px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--bg);
  font-size: 13px; font-weight: 700;
  color: var(--fg);
  cursor: pointer;
}
.segmented input,
.cover-option input { accent-color: var(--accent); }
.cover-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.cover-option {
  flex-direction: column;
  align-items: stretch;
  padding: 7px;
  min-height: auto;
}
.cover-swatch {
  height: 34px;
  border-radius: var(--radius-sm);
}
.payment-grid {
  display: grid;
  gap: 8px;
  margin-top: 10px;
}
.payment-option {
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 46px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--bg);
  padding: 10px 12px;
  font-size: 14px;
  font-weight: 700;
  color: var(--fg);
}
.payment-option input { accent-color: var(--accent); }
.payment-option small {
  display: block;
  margin-top: 2px;
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
}
.order-success {
  text-align: center;
  padding: 6px 2px 2px;
}
.order-success svg {
  width: 48px;
  height: 48px;
  color: var(--accent);
  margin-bottom: 8px;
}
.order-success h3 {
  font-size: 20px;
  margin-bottom: 6px;
}
.order-success p {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
}
.order-status-card {
  margin-top: 12px;
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-lg);
  background: var(--surface-warm);
  padding: 12px;
}
.order-status-top {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: flex-start;
  margin-bottom: 10px;
}
.order-status-title {
  font-size: 15px;
  font-weight: 800;
  color: var(--fg);
}
.order-status-note {
  margin-top: 3px;
  font-size: 12px;
  color: var(--muted);
  line-height: 1.45;
}
.order-badge {
  flex-shrink: 0;
  border-radius: var(--radius-pill);
  background: var(--bg);
  color: var(--fg);
  border: 1px solid var(--border);
  padding: 5px 9px;
  font-size: 12px;
  font-weight: 800;
}
.order-steps {

  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.order-step {
  border-radius: var(--radius-md);
  background: var(--bg);
  border: 1px solid var(--border-soft);
  padding: 8px 6px;
  font-size: 11px;
  line-height: 1.25;
  color: var(--muted);
  text-align: center;
  font-weight: 700;
}
.order-step.active {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--accent-on);
}
.order-step.done {
  color: var(--fg);
  border-color: color-mix(in oklab, var(--accent) 22%, var(--border));
}
.action-row { display: flex; gap: 10px; margin-top: 14px; }
.btn { flex: 1; border: 0; border-radius: var(--radius-pill); padding: 12px 14px; font-size: 15px; font-weight: 700; cursor: pointer; }
.btn-primary { background: var(--accent); color: var(--accent-on); }
.btn-secondary { background: var(--surface-warm); color: var(--fg); }

// ─── Render ────────────────────────────────────────────────────────

    '<div id="fullListResults" class="full-list"></div>';

  document.getElementById('detailSheet').classList.add('show');
  renderFullList();
}

function setListFilter(group, value) {
  listFilters[activeListType][group] = value;
  renderFullList();
}

function renderFullList() {
  if (activeListType === 'activity') {
    renderActivityFullList();
  } else {
    renderServiceFullList();
  }
}

function renderActivityFullList() {
  var filters = listFilters.activity;
  var filtered = activities.filter(function(a) {
    var statusMatch = filters.status === 'all' || a.status === filters.status;
    var typeMatch = filters.type === 'all' || a.type === filters.type;
    var modeMatch = filters.mode === 'all' || a.mode === filters.mode;
    return statusMatch && typeMatch && modeMatch;
  });
  document.getElementById('fullListFilters').innerHTML =
    buildFilterGroup('状态', 'status', [
      ['all', '全部'], ['open', '报名中'], ['full', '已满员']
    ], filters.status) +
    buildFilterGroup('来源', 'type', [
      ['all', '全部'], ['official', '官方'], ['user', '邻里发起']
    ], filters.type) +
    buildFilterGroup('形式', 'mode', [
      ['all', '全部'], ['线下', '线下'], ['线上', '线上']
    ], filters.mode);
  document.getElementById('fullListResults').innerHTML = filtered.length
    ? filtered.map(function(a) {
      return '<div class="full-list-item" onclick="openActivityDetail(' + a.id + ')">' +
        '<div class="full-list-top"><div class="full-list-title">' + esc(a.title) + '</div><span class="full-list-tag">' + esc(a.status === 'open' ? '报名中' : '已满员') + '</span></div>' +

    var priceMatch = filters.price === 'all'

      || (filters.price === 'mid' && s.price > 15);
    return categoryMatch && priceMatch;

}

function buildFilterGroup(title, group, options, current) {
  var html = '<div class="filter-group"><div class="filter-title">' + title + '</div><div class="filter-chips">';
  options.forEach(function(opt) {
    html += '<button class="filter-chip' + (opt[0] === current ? ' active' : '') + '" onclick="setListFilter(\'' + group + '\', \'' + opt[0] + '\')">' + opt[1] + '</button>';
  });
  html += '</div></div>';
  return html;
}

function showMask() {
  document.getElementById('modalMask').classList.add('show');
}

function closeSheets() {
  document.getElementById('modalMask').classList.remove('show');
  document.getElementById('detailSheet').classList.remove('show');
  document.getElementById('launchSheet').classList.remove('show');
}

function openLaunchSheet() {
  if (!requireAuth(function() { openLaunchSheet(); })) return;
  showMask();
  document.getElementById('launchSheet').classList.add('show');
}

function submitActivity() {
  if (!requireAuth(function() { submitActivity(); })) return;
  var title = document.getElementById('actTitle').value.trim();
  var coverInput = document.querySelector('input[name="actCover"]:checked');
  var modeInput = document.querySelector('input[name="actMode"]:checked');
  var coverClass = coverInput ? coverInput.value : 'cover-grad-2';
  var mode = modeInput ? modeInput.value : '线下';
  var date = document.getElementById('actDate').value.trim();
  var location = document.getElementById('actLocation').value.trim();
  var fee = document.getElementById('actFee').value.trim();
  var max = parseInt(document.getElementById('actMax').value, 10);
  var desc = document.getElementById('actDesc').value.trim();
  if (!title || !date || !location || !fee || !max || !desc) {
    showToast('请补全活动信息');
    return;
  }
  activityReviewQueue.unshift({
    id: nextActivityId++,
    title: title,
    type: 'user',
    typeLabel: '用户活动',
    date: date,
    location: location,
    mode: mode,
    fee: fee,
    status: 'review',
    participants: 0,
    maxParticipants: max,
    coverClass: coverClass,
    registrations: [],
    desc: desc
  });
  ['actTitle','actDate','actLocation','actFee','actMax','actDesc'].forEach(function(id) {
    document.getElementById(id).value = '';
  });
  document.querySelector('input[name="actCover"][value="cover-grad-1"]').checked = true;
  document.querySelector('input[name="actMode"][value="线下"]').checked = true;
  closeSheets();
  renderActivityReviewQueue();
  showToast('已提交审核，审核通过后公开展示');
}

function openActivityDetail(id) {
  if (!requireAuth(function() { openActivityDetail(id); })) return;
  var a = activities.find(function(item) { return item.id === id; });
  if (!a) return;
  var isOpen = a.status === 'open' && a.participants < a.maxParticipants;
  var hasJoined = hasJoinedActivity(a);
  var primary = isOpen
    ? '<button class="btn btn-primary" onclick="openActivitySignup(' + a.id + ')">' + (hasJoined ? '查看报名' : '立即报名') + '</button>'
    : '<button class="btn btn-primary" onclick="showToast(\'已加入候补提醒\')">候补提醒</button>';
  document.getElementById('detailSheet').innerHTML =
    '<div class="sheet-hd"><div class="sheet-title">活动详情</div><button class="sheet-close" onclick="closeSheets()" aria-label="关闭"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>'
    + '<div class="detail-panel"><h3>' + esc(a.title) + '</h3><p>' + esc(a.desc) + '</p><div class="detail-list"><div class="detail-row"><span>类型</span><span>' + esc(a.typeLabel) + '</span></div><div class="detail-row"><span>形式</span><span>' + esc(a.mode || '线下') + '</span></div><div class="detail-row"><span>费用</span><span>' + esc(a.fee || '免费') + '</span></div><div class="detail-row"><span>时间</span><span>' + esc(a.date) + '</span></div><div class="detail-row"><span>地点</span><span>' + esc(a.location) + '</span></div><div class="detail-row"><span>人数</span><span>' + a.participants + '/' + a.maxParticipants + '人</span></div></div></div>'
    + '<div class="action-row"><button class="btn btn-secondary" onclick="closeSheets()">关闭</button>' + primary + '</div>';
  showMask();
  document.getElementById('detailSheet').classList.add('show');
}

function openActivitySignup(id) {
  if (!requireAuth(function() { openActivitySignup(id); })) return;
  var a = activities.find(function(item) { return item.id === id; });
  if (!a) return;
  if (a.participants >= a.maxParticipants) {
    a.status = 'full';
    showToast('活动已满员');
    return;
  }
  var existing = getCurrentRegistration(a);
  var duplicateHint = existing
    ? '<div class="hint-card"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 6L9 17l-5-5"/></svg><div>你已报名此活动，报名人：' + esc(existing.name) + '，手机号：' + esc(maskPhone(existing.phone)) + '。</div></div>'
    : '<div class="hint-card"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><div>报名成功后可接收活动开始提醒、地点变更和候补通知。</div></div>';
  document.getElementById('detailSheet').innerHTML =
    '<div class="sheet-hd"><div class="sheet-title">报名确认</div><button class="sheet-close" onclick="openActivityDetail(' + a.id + ')" aria-label="返回"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button></div>'
    + '<div class="detail-panel"><h3>' + esc(a.title) + '</h3><p>' + esc(a.date) + ' · ' + esc(a.location) + '</p><div class="detail-list"><div class="detail-row"><span>费用</span><span>' + esc(a.fee || '免费') + '</span></div><div class="detail-row"><span>名额</span><span>' + a.participants + '/' + a.maxParticipants + '人</span></div></div></div>'
    + duplicateHint
    + '<div class="form-grid" style="margin-top:10px;"><div class="field"><label for="signupName">姓名</label><input id="signupName" placeholder="请输入真实姓名" value="' + esc(existing ? existing.name : '') + '"' + (existing ? ' disabled' : '') + '></div>'
    + '<div class="field"><label for="signupPhone">手机号</label><input id="signupPhone" inputmode="tel" maxlength="11" placeholder="用于活动通知和重复报名校验" value="' + esc(existing ? existing.phone : '') + '"' + (existing ? ' disabled' : '') + '></div>'
    + '<label class="check-card"><input type="checkbox" id="signupSubscribe" checked' + (existing ? ' disabled' : '') + '><span>接收活动订阅消息，包含开始前提醒、地点变更和候补通知。</span></label></div>'
    + '<div class="action-row"><button class="btn btn-secondary" onclick="openActivityDetail(' + a.id + ')">返回</button><button class="btn btn-primary" onclick="submitActivitySignup(' + a.id + ')"' + (existing ? ' disabled' : '') + '>' + (existing ? '已报名' : '确认报名') + '</button></div>';
}

function submitActivitySignup(id) {
  if (!requireAuth(function() { submitActivitySignup(id); })) return;
  var a = activities.find(function(item) { return item.id === id; });
  if (!a) return;
  if (a.participants >= a.maxParticipants) {
    a.status = 'full';
    showToast('活动已满员');
    openActivityDetail(id);
    renderActivities();
    return;
  }
  var name = document.getElementById('signupName').value.trim();
  var phone = document.getElementById('signupPhone').value.trim();
  var subscribe = document.getElementById('signupSubscribe').checked;
  if (!name) {
    showToast('请填写姓名');
    return;
  }
  if (!/^1[3-9]\d{9}$/.test(phone)) {
    showToast('请填写正确手机号');
    return;
  }
  a.registrations = a.registrations || [];
  var duplicate = a.registrations.some(function(item) { return item.phone === phone; });
  if (duplicate) {
    showToast('你已报名过该活动');
    openActivitySignup(id);
    return;
  }
  a.registrations.push({ name: name, phone: phone, subscribe: subscribe });
  a.participants += 1;
  if (a.participants >= a.maxParticipants) a.status = 'full';
  renderActivities();
  openActivitySignup(id);
  showToast(subscribe ? '报名成功，已开启活动提醒' : '报名成功');
}

function maskPhone(phone) {
  return String(phone || '').replace(/^(\d{3})\d{4}(\d{4})$/, '$1****$2');
}

function getCurrentRegistration(activity) {
  var list = activity.registrations || [];
  return list.find(function(item) { return item.phone === currentUserPhone; });
}

function hasJoinedActivity(activity) {
  return Boolean(getCurrentRegistration(activity));
}

function openServiceDetail(id) {
  if (!requireAuth(function() { openServiceDetail(id); })) return;
  var s = services.find(function(item) { return item.id === id; });
  if (!s) return;
  document.getElementById('detailSheet').innerHTML =
    '<div class="sheet-hd"><div class="sheet-title">代办详情</div><button class="sheet-close" onclick="closeSheets()" aria-label="关闭"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>'
    + '<div class="detail-panel"><h3>' + esc(s.name) + '</h3><p>' + esc(s.desc) + '</p><div class="detail-list"><div class="detail-row"><span>服务价格</span><span>¥' + s.price + s.priceUnit + '</span></div><div class="detail-row"><span>需要信息</span><span>' + esc(s.fields) + '</span></div><div class="detail-row"><span>订单流程</span><span>待支付 → 已支付 → 处理中 → 完成/取消/超时</span></div></div></div>'
    + '<div class="form-grid"><div class="field"><label for="orderAddress">服务地址</label><input id="orderAddress" placeholder="例如：郑东人才公寓 3号楼 1206"></div><div class="field"><label for="orderNote">代办说明</label><textarea id="orderNote" placeholder="取件码、材料、期望时间等必要信息"></textarea></div></div>'
    + '<div class="action-row"><button class="btn btn-secondary" onclick="closeSheets()">取消</button><button class="btn btn-primary" onclick="confirmServiceOrder(' + s.id + ')">确认订单</button></div>';
  showMask();
  document.getElementById('detailSheet').classList.add('show');
}

function confirmServiceOrder(id) {
  if (!requireAuth(function() { confirmServiceOrder(id); })) return;
  var s = services.find(function(item) { return item.id === id; });
  if (!s) return;
  var address = document.getElementById('orderAddress').value.trim();
  var note = document.getElementById('orderNote').value.trim();
  if (!address || !note) {
    showToast('请填写地址和说明');
    return;
  }
  pendingServiceOrder = {
    orderNo: 'XD' + nextServiceOrderNo++,
    serviceId: s.id,
    serviceName: s.name,
    address: address,
    note: note,
    amount: s.price,
    priceUnit: s.priceUnit,
    status: 'pending_payment',
    payMethod: '',
    createdAt: '刚刚'
  };
  currentServiceOrder = pendingServiceOrder;
  renderServiceOrderSheet('确认支付');
}

function payServiceOrder() {
  if (!requireAuth(function() { payServiceOrder(); })) return;
  if (!currentServiceOrder || currentServiceOrder.status !== 'pending_payment') {
    showToast('请先确认订单');
    return;
  }
  var methodInput = document.querySelector('input[name="payMethod"]:checked');
  var method = methodInput ? methodInput.value : '微信支付';
  currentServiceOrder.payMethod = method;
  currentServiceOrder.status = 'paid';
  pendingServiceOrder = null;
  renderServiceOrderSheet('支付成功');
  showToast('支付成功，订单已生成');
}

function updateServiceOrderStatus(status) {
  if (!currentServiceOrder) {
    showToast('暂无订单');
    return;
  }
  currentServiceOrder.status = status;
  var messages = {
    processing: '服务人员已开始处理',
    completed: '订单已完成',
    canceled: '订单已取消',
    timeout: '订单已超时'
  };
  renderServiceOrderSheet(getOrderStatusLabel(status));
  showToast(messages[status] || '订单状态已更新');
}

function getOrderStatusLabel(status) {
  var map = {
    pending_payment: '待支付',
    paid: '已支付',
    processing: '处理中',
    completed: '已完成',
    canceled: '已取消',
    timeout: '已超时'
  };
  return map[status] || '订单状态';
}

function getOrderStatusNote(status) {
  var map = {
    pending_payment: '请在订单超时前完成支付，支付后平台会安排服务人员。',
    paid: '订单已支付，等待服务人员开始处理。',
    processing: '服务人员正在处理，请留意消息通知。',
    completed: '服务已完成，订单流程结束。',
    canceled: '订单已取消，不再安排服务。',
    timeout: '订单已超时关闭，如仍需服务请重新下单。'
  };
  return map[status] || '';
}

function buildOrderSteps(status) {
  var finalMap = { completed: '已完成', canceled: '已取消', timeout: '已超时' };
  var steps = [
    ['pending_payment', '待支付'],
    ['paid', '已支付'],
    ['processing', '处理中'],
    ['final', finalMap[status] || '完成/取消']
  ];
  var indexMap = {
    pending_payment: 0,
    paid: 1,
    processing: 2,
    completed: 3,
    canceled: 3,
    timeout: 3
  };
  var activeIndex = indexMap[status] == null ? 0 : indexMap[status];
  return '<div class="order-steps">' + steps.map(function(step, index) {
    var cls = index < activeIndex ? ' done' : (index === activeIndex ? ' active' : '');
    return '<div class="order-step' + cls + '">' + esc(step[1]) + '</div>';
  }).join('') + '</div>';
}

function buildServiceOrderActions(order) {
  if (order.status === 'pending_payment') {
    return '<div class="payment-grid"><label class="payment-option"><input type="radio" name="payMethod" value="微信支付" checked><span>微信支付<small>推荐，支付后即时生成订单</small></span></label><label class="payment-option"><input type="radio" name="payMethod" value="余额支付"><span>余额支付<small>使用账户余额抵扣本次服务费</small></span></label></div>'
      + '<div class="action-row"><button class="btn btn-secondary" onclick="updateServiceOrderStatus(\'canceled\')">取消订单</button><button class="btn btn-primary" onclick="payServiceOrder()">立即支付 ¥' + order.amount + '</button></div>'
      + '<div class="action-row"><button class="btn btn-secondary" onclick="updateServiceOrderStatus(\'timeout\')">超时关闭</button></div>';
  }
  if (order.status === 'paid') {
    return '<div class="action-row"><button class="btn btn-secondary" onclick="updateServiceOrderStatus(\'canceled\')">取消订单</button><button class="btn btn-primary" onclick="updateServiceOrderStatus(\'processing\')">开始处理</button></div>';
  }
  if (order.status === 'processing') {
    return '<div class="action-row"><button class="btn btn-secondary" onclick="showToast(\'已提醒服务人员同步进度\')">催办进度</button><button class="btn btn-primary" onclick="updateServiceOrderStatus(\'completed\')">确认完成</button></div>';
  }
  return '<div class="action-row"><button class="btn btn-secondary" onclick="closeSheets()">完成</button><button class="btn btn-primary" onclick="showToast(\'可在我的订单查看历史记录\')">查看订单</button></div>';
}

function renderServiceOrderSheet(title) {
  var order = currentServiceOrder;
  if (!order) return;
  document.getElementById('detailSheet').innerHTML =
    '<div class="sheet-hd"><div class="sheet-title">' + esc(title || '订单详情') + '</div><button class="sheet-close" onclick="closeSheets()" aria-label="关闭"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>'
    + '<div class="order-success"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M8 12.5l2.6 2.6L16.5 9"/></svg><h3>' + esc(getOrderStatusLabel(order.status)) + '</h3><p>订单号 ' + esc(order.orderNo) + ' · ' + esc(getOrderStatusNote(order.status)) + '</p></div>'
    + '<div class="detail-panel"><div class="detail-list"><div class="detail-row"><span>服务项目</span><span>' + esc(order.serviceName) + '</span></div><div class="detail-row"><span>服务地址</span><span>' + esc(order.address) + '</span></div><div class="detail-row"><span>代办说明</span><span>' + esc(order.note) + '</span></div><div class="detail-row"><span>支付方式</span><span>' + esc(order.payMethod || '未支付') + '</span></div><div class="detail-row"><span>支付金额</span><span>¥' + order.amount + '</span></div></div></div>'
    + '<div class="order-status-card"><div class="order-status-top"><div><div class="order-status-title">订单状态流</div><div class="order-status-note">' + esc(getOrderStatusNote(order.status)) + '</div></div><span class="order-badge">' + esc(getOrderStatusLabel(order.status)) + '</span></div>' + buildOrderSteps(order.status) + '</div>'
    + buildServiceOrderActions(order);
}

// ─── Toast ─────────────────────────────────────────────────────────
var toastTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 1800);
}

// ─── Tab ───────────────────────────────────────────────────────────
function switchTab(el, name) {
  if (el.classList.contains('active')) return;
  var tabs = document.querySelectorAll('.tab-item');
  for (var i = 0; i < tabs.length; i++) { tabs[i].classList.remove('active'); }
  el.classList.add('active');
  if (name === '首页') { window.location.href = 'app-home.html'; return; }
  if (name === '我的') { window.location.href = 'app-profile.html'; return; }
  if (name === '借个锤子') { window.location.href = 'app-borrow.html'; return; }
  if (name === '消息') { window.location.href = 'app-messages.html'; return; }
  showToast(name + ' — 即将开放');
}

// ─── Init ──────────────────────────────────────────────────────────
renderActivities();
renderActivityReviewQueue();
renderServices();
</script>

<script src="auth-guard.js"></script>

</body>
