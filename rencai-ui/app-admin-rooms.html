<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>晓得青年 · 户型管理</title>
<style>
:root {
  --bg: #fafaf6; --surface: #fffdf7; --surface-warm: #fef8ef;
  --fg: #2d2318; --fg-2: #5c4a38; --muted: #8c7a68; --meta: #a69682;
  --border: #e8e0d4; --border-soft: #f0eae0; --accent: #e8723c;
  --accent-on: #ffffff; --accent-hover: #f0804a; --accent-active: #d4622c;
  --font-display: "SF Pro Display","PingFang SC","SF Pro Icons","Helvetica Neue",Helvetica,Arial,sans-serif;
  --font-body: "PingFang SC","SF Pro Text","SF Pro Icons","Helvetica Neue",Helvetica,Arial,sans-serif;
  --text-xs: 12px; --text-sm: 14px; --text-base: 16px;
  --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-5: 20px;
  --radius-sm: 8px; --radius-md: 12px; --radius-lg: 18px; --radius-pill: 980px;
  --ease-standard: cubic-bezier(0.28,0,0.22,1);
  --motion-fast: 150ms; --motion-base: 220ms;
  --price-orange: #e8590c; --community-green: #5b9a6f; --badge-red: #e04a3a;
  --device-bg: #d8d0c4; --phone-bezel: #0a0a0a; --phone-inner: #0a0a0a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body { display: grid; place-items: center; min-height: 100vh; background: var(--device-bg); font-family: var(--font-body); font-size: var(--text-base); color: var(--fg); -webkit-font-smoothing: antialiased; }

.phone-frame { width: 390px; min-width: 390px; height: 844px; background: var(--phone-bezel); border-radius: 50px; padding: 14px; box-shadow: 0 20px 60px rgba(0,0,0,0.25), 0 4px 16px rgba(0,0,0,0.1); flex-shrink: 0; }
.phone-screen { width: 100%; height: 100%; background: var(--bg); border-radius: 38px; overflow: hidden; display: flex; flex-direction: column; position: relative; }
.dynamic-island { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 126px; height: 34px; background: var(--phone-inner); border-radius: 20px; z-index: 100; }

.status-bar { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px 0; height: 50px; font-size: 14px; font-weight: 600; color: var(--fg); }
.status-time { flex: 1; }
.status-icons { display: flex; align-items: center; gap: 6px; }
.status-icons svg { width: 16px; height: 16px; }

.mp-nav { display: flex; align-items: center; height: 44px; padding: 0 12px; flex-shrink: 0; position: relative; }
.mp-nav-back { width: 32px; height: 32px; display: grid; place-items: center; border-radius: 50%; cursor: pointer; transition: background var(--motion-fast); flex-shrink: 0; }
.mp-nav-back:active { background: var(--surface); }
.mp-nav-back svg { width: 22px; height: 22px; color: var(--fg); }
.mp-nav-title { flex: 1; text-align: center; font-family: var(--font-display); font-size: 17px; font-weight: 600; letter-spacing: -0.01em; color: var(--fg); margin-right: 32px; }

.mp-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; padding-bottom: 8px; }
.mp-scroll::-webkit-scrollbar { width: 0; }

/* Filter chip */
.filter-row { display: flex; gap: 6px; padding: 8px 16px; flex-shrink: 0; overflow-x: auto; }
.filter-chip { padding: 5px 12px; border-radius: var(--radius-pill); font-size: 12px; font-weight: 500; border: 1px solid var(--border); background: transparent; color: var(--fg-2); cursor: pointer; white-space: nowrap; transition: all var(--motion-fast); }
.filter-chip.active { background: var(--accent); color: var(--accent-on); border-color: var(--accent); }

.toolbar { display: flex; gap: 8px; padding: 8px 16px 12px; flex-shrink: 0; }
.btn-add { padding: 8px 16px; background: var(--accent); color: var(--accent-on); border: none; border-radius: var(--radius-md); font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-add:active { opacity: 0.85; }

/* List */
.list { padding: 4px 16px 20px; display: flex; flex-direction: column; gap: 10px; }
.item { background: var(--surface); border: 1px solid var(--border-soft); border-radius: var(--radius-lg); padding: 14px 16px; }
.item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.item-name { font-size: 16px; font-weight: 600; }
.item-actions { display: flex; gap: 6px; }
.btn-sm { padding: 5px 12px; border-radius: var(--radius-pill); font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--fg-2); }
.btn-sm:active { opacity: 0.7; }
.btn-sm.danger { color: var(--badge-red); border-color: color-mix(in oklab, var(--badge-red) 30%, transparent); }
.item-meta { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
.item-apart { font-size: 12px; color: var(--accent); font-weight: 500; margin-bottom: 4px; }
.item-status { display: inline-block; padding: 2px 8px; border-radius: var(--radius-pill); font-size: 11px; font-weight: 600; margin-top: 4px; }
.status-on { background: color-mix(in oklab, var(--community-green) 10%, transparent); color: var(--community-green); }
.status-off { background: color-mix(in oklab, var(--muted) 10%, transparent); color: var(--muted); }

.empty { text-align: center; padding: 64px 20px; color: var(--muted); }
.empty svg { width: 48px; height: 48px; color: var(--border); margin-bottom: 12px; }
.empty p { font-size: 14px; }

/* Modal */
.modal-mask { position: absolute; inset: 0; background: rgba(0,0,0,0.3); z-index: 200; display: none; align-items: center; justify-content: center; }
.modal-mask.show { display: flex; }
.modal-card { width: 340px; max-height: 90%; background: var(--bg); border-radius: var(--radius-lg); padding: 20px; overflow-y: auto; animation: fadeIn var(--motion-base); }
.modal-title { font-size: 17px; font-weight: 600; margin-bottom: 16px; text-align: center; }
.modal-field { margin-bottom: 10px; }
.modal-field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
.modal-field input, .modal-field select, .modal-field textarea { width: 100%; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); font: inherit; font-size: 14px; color: var(--fg); }
.modal-field textarea { height: 60px; resize: vertical; }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; }
.modal-btn { flex: 1; padding: 12px 0; border-radius: var(--radius-md); font-size: 15px; font-weight: 600; cursor: pointer; border: none; text-align: center; }
.btn-cancel { background: var(--surface); color: var(--fg); border: 1px solid var(--border); }
.btn-confirm { background: var(--accent); color: var(--accent-on); }
.btn-delete { background: var(--badge-red); color: #fff; }

@keyframes fadeIn { from { opacity:0; transform:scale(0.96); } to { opacity:1; transform:scale(1); } }

.toast { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); background: var(--fg); color: var(--bg); padding: 10px 20px; border-radius: var(--radius-pill); font-size: 14px; font-weight: 500; opacity: 0; pointer-events: none; transition: opacity var(--motion-base); z-index: 250; white-space: nowrap; }
.toast.show { opacity: 1; }
.home-indicator { width: 134px; height: 5px; background: var(--fg); border-radius: 3px; margin: 8px auto; opacity: 0.2; }

@media (max-width: 430px) {
  body { background: var(--bg); align-items: flex-start; }
  .phone-frame { width: 100vw; height: 100vh; height: 100dvh; min-width: unset; border-radius: 0; padding: 0; box-shadow: none; }
  .phone-screen { border-radius: 0; }
  .dynamic-island { display: none; }
  .status-bar { padding: 12px 20px 0; height: 44px; }
}
</style>
</head>
<body>

<div class="phone-frame">
  <div class="phone-screen">
    <div class="dynamic-island"></div>

    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <svg viewBox="0 0 16 12" fill="currentColor"><rect x="0" y="7" width="2" height="4" rx="0.5"/><rect x="3" y="5" width="2" height="6" rx="0.5"/><rect x="6" y="2" width="2" height="9" rx="0.5"/><rect x="9" y="0" width="2" height="11" rx="0.5"/></svg>
        <svg viewBox="0 0 18 12" fill="currentColor"><path d="M1 3.5h1.5L3.5 8h11l1-4.5H16a1 1 0 011 1v6a1 1 0 01-1 1H2a1 1 0 01-1-1v-6a1 1 0 011-1z"/><rect x="4" y="8.5" width="10" height="1.5" rx="0.5"/></svg>
        <svg viewBox="0 0 28 12" fill="currentColor"><rect x="0" y="0" width="24" height="12" rx="2.5" stroke="currentColor" fill="none" stroke-width="1"/><rect x="2" y="2" width="18" height="8" rx="1"/><rect x="25" y="3" width="2" height="6" rx="0.8"/></svg>
      </div>
    </div>

    <div class="mp-nav">
      <div class="mp-nav-back" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </div>
      <span class="mp-nav-title">户型管理</span>
    </div>

    <!-- Apartment filter -->
    <div class="filter-row" data-od-id="room-admin-filter" id="filterRow">
      <span class="filter-chip active" onclick="setFilter('all', this)">全部</span>
      <span class="filter-chip" onclick="setFilter('郑东人才公寓', this)">郑东人才公寓</span>
      <span class="filter-chip" onclick="setFilter('二七人才公寓', this)">二七人才公寓</span>
      <span class="filter-chip" onclick="setFilter('中原青年社区', this)">中原青年社区</span>
    </div>

    <div class="toolbar">
      <button class="btn-add" onclick="openForm(null)" style="width:100%">+ 新增户型</button>
    </div>

    <div class="mp-scroll">
      <div class="list" id="list"></div>
    </div>

    <!-- Form Modal -->
    <div class="modal-mask" id="formMask" onclick="closeForm(event)">
      <div class="modal-card" onclick="event.stopPropagation()">
        <div class="modal-title" id="formTitle">新增户型</div>
        <div class="modal-field"><label>所属公寓</label><div style="display:flex;align-items:center;gap:8px;"><input id="fApartment" readonly placeholder="请选择公寓" style="flex:1;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);font:inherit;font-size:14px;color:var(--fg);cursor:pointer;" onclick="openApartmentPicker()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;color:var(--meta);cursor:pointer;" onclick="openApartmentPicker()"><path d="M9 18l6-6-6-6"/></svg></div></div>
        <div class="modal-field"><label>户型名称</label><input id="fName" placeholder="如：精致一居室"></div>
        <div class="modal-field"><label>面积</label><input id="fArea" placeholder="如：35㎡"></div>
        <div class="modal-field"><label>朝向</label><input id="fOrient" placeholder="如：南向"></div>
        <div class="modal-field"><label>居室</label><input id="fRooms" placeholder="如：1室1厅1卫"></div>
        <div class="modal-field"><label>租金</label><input id="fRent" placeholder="如：¥1200/月起"></div>
        <div class="modal-field"><label>楼层</label><input id="fFloor" placeholder="如：3层/总8层"></div>
        <div class="modal-field"><label>状态</label><select id="fStatus"><option value="active">启用</option><option value="inactive">停用</option></select></div>
        <input type="hidden" id="fId">
        <div class="modal-actions">
          <button class="modal-btn btn-cancel" onclick="closeForm()">取消</button>
          <button class="modal-btn btn-delete" id="btnDelete" style="display:none" onclick="deleteItem()">删除</button>
          <button class="modal-btn btn-confirm" onclick="saveItem()">保存</button>
        </div>
      </div>
    </div>

    <!-- Delete -->
    <div class="modal-mask" id="deleteMask" onclick="closeDelete(event)">
      <div class="modal-card" onclick="event.stopPropagation()">
        <div class="modal-title">确认删除</div>
        <p style="text-align:center;font-size:14px;color:var(--muted);margin-bottom:16px;">删除后不可恢复，确定要删除吗？</p>
        <div class="modal-actions">
          <button class="modal-btn btn-cancel" onclick="closeDelete()">取消</button>
          <button class="modal-btn btn-delete" onclick="confirmDelete()">确认删除</button>
        </div>
      </div>
    </div>

    <!-- Apartment Picker -->
    <div class="modal-mask" id="aptPickerMask" onclick="closeAptPicker(event)">
      <div class="modal-card" onclick="event.stopPropagation()" style="max-height:300px;">
        <div class="modal-title">选择公寓</div>
        <div style="display:flex;flex-direction:column;gap:6px;" id="aptPickerList"></div>
      </div>
    </div>

    <div class="home-indicator"></div>
    <div class="toast" id="toast"></div>
  </div>
</div>

<script>
var data = [
  { id:1, apartment:'郑东人才公寓', name:'精致一居室', area:'35㎡', orient:'南向', rooms:'1室1厅1卫', rent:'¥1200/月起', floor:'3层/总8层', status:'active' },
  { id:2, apartment:'郑东人才公寓', name:'舒适两居室', area:'55㎡', orient:'东南向', rooms:'2室1厅1卫', rent:'¥1500/月起', floor:'5层/总8层', status:'active' },
  { id:3, apartment:'郑东人才公寓', name:'阳光大单间', area:'28㎡', orient:'南向', rooms:'开间', rent:'¥1000/月起', floor:'2层/总8层', status:'active' },
  { id:4, apartment:'二七人才公寓', name:'温馨一居室', area:'32㎡', orient:'南向', rooms:'1室1卫', rent:'¥1000/月起', floor:'4层/总12层', status:'active' },
  { id:5, apartment:'二七人才公寓', name:'宽敞两居室', area:'60㎡', orient:'西南向', rooms:'2室1厅1卫', rent:'¥1500/月起', floor:'8层/总12层', status:'active' },
  { id:6, apartment:'中原青年社区', name:'舒适一居室', area:'38㎡', orient:'东南向', rooms:'1室1厅1卫', rent:'¥850/月起', floor:'6层/总10层', status:'active' }
];
var nextId = 7;
var editId = null;
var deleteId = null;
var activeFilter = 'all';

var apartmentList = [
  '郑东人才公寓','高新人才家园','经开青年公寓','港区人才社区','二七人才公寓','中原青年社区',
  '管城人才公寓','金水青年社区','惠济人才家园','上街青年公寓'
];

function openApartmentPicker() {
  var list = document.getElementById('aptPickerList');
  var currentVal = document.getElementById('fApartment').value;
  list.innerHTML = apartmentList.map(function(a) {
    var checked = (a === currentVal) ? 'background:var(--accent);border-color:var(--accent);color:var(--accent-on);' : '';
    return '<div style="padding:12px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;font-size:14px;transition:all var(--motion-fast);' + checked + '" onclick="selectApartment(\'' + a.replace(/'/g, "\\'") + '\')">' + a + '</div>';
  }).join('');
  document.getElementById('aptPickerMask').classList.add('show');
}

function selectApartment(name) {
  document.getElementById('fApartment').value = name;
  document.getElementById('aptPickerMask').classList.remove('show');
}

function closeAptPicker(e) {
  if (e && e.target !== document.getElementById('aptPickerMask')) return;
  document.getElementById('aptPickerMask').classList.remove('show');
}

function setFilter(f, el) {
  activeFilter = f;
  var chips = document.querySelectorAll('#filterRow .filter-chip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
  el.classList.add('active');
  render();
}

function render() {
  var filtered = activeFilter === 'all' ? data : data.filter(function(d) { return d.apartment === activeFilter; });
  var html = '';
  filtered.forEach(function(d) {
    html += '<div class="item">'
      + '<div class="item-header"><span class="item-name">' + d.name + '</span>'
      + '<div class="item-actions">'
      + '<button class="btn-sm" onclick="openForm(' + d.id + ')">编辑</button>'
      + '<button class="btn-sm danger" onclick="openDelete(' + d.id + ')">删除</button>'
      + '</div></div>'
      + '<div class="item-apart">📍 ' + d.apartment + '</div>'
      + '<div class="item-meta">' + d.area + ' · ' + d.orient + ' · ' + d.rooms + ' · ' + d.rent + ' · ' + d.floor + '</div>'
      + '<span class="item-status ' + (d.status === 'active' ? 'status-on' : 'status-off') + '">' + (d.status === 'active' ? '启用' : '停用') + '</span>'
      + '</div>';
  });
  document.getElementById('list').innerHTML = html || '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg><p>暂无户型数据</p></div>';
}

function openForm(id) {
  editId = id;
  if (id) {
    var d = data.find(function(x) { return x.id === id; });
    document.getElementById('formTitle').textContent = '编辑户型';
    document.getElementById('fApartment').value = d.apartment;
    document.getElementById('fName').value = d.name;
    document.getElementById('fArea').value = d.area;
    document.getElementById('fOrient').value = d.orient;
    document.getElementById('fRooms').value = d.rooms;
    document.getElementById('fRent').value = d.rent;
    document.getElementById('fFloor').value = d.floor;
    document.getElementById('fStatus').value = d.status;
    document.getElementById('btnDelete').style.display = 'block';
  } else {
    document.getElementById('formTitle').textContent = '新增户型';
    document.getElementById('fApartment').value = '郑东人才公寓';
    document.getElementById('fName').value = '';
    document.getElementById('fArea').value = '';
    document.getElementById('fOrient').value = '';
    document.getElementById('fRooms').value = '';
    document.getElementById('fRent').value = '';
    document.getElementById('fFloor').value = '';
    document.getElementById('fStatus').value = 'active';
    document.getElementById('btnDelete').style.display = 'none';
  }
  document.getElementById('formMask').classList.add('show');
}

function saveItem() {
  var obj = {
    apartment: document.getElementById('fApartment').value,
    name: document.getElementById('fName').value.trim(),
    area: document.getElementById('fArea').value.trim(),
    orient: document.getElementById('fOrient').value.trim(),
    rooms: document.getElementById('fRooms').value.trim(),
    rent: document.getElementById('fRent').value.trim(),
    floor: document.getElementById('fFloor').value.trim(),
    status: document.getElementById('fStatus').value
  };
  if (!obj.name) { showToast('请输入户型名称'); return; }
  if (editId) {
    var d = data.find(function(x) { return x.id === editId; });
    Object.assign(d, obj);
  } else {
    obj.id = nextId++;
    data.push(obj);
  }
  closeForm();
  render();
  showToast(editId ? '已更新' : '已新增');
}

function openDelete(id) { deleteId = id; document.getElementById('deleteMask').classList.add('show'); }
function closeDelete(e) { if (e && e.target !== document.getElementById('deleteMask')) return; document.getElementById('deleteMask').classList.remove('show'); }
function confirmDelete() {
  data = data.filter(function(x) { return x.id !== deleteId; });
  closeDelete();
  render();
  showToast('已删除');
}

function closeForm(e) { if (e && e.target !== document.getElementById('formMask')) return; document.getElementById('formMask').classList.remove('show'); editId = null; }

var toastTimer;
function showToast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(function() { t.classList.remove('show'); }, 1800); }
render();
</script>
</body>
</html>
