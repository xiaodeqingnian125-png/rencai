<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>晓得青年 · 我的收藏</title>
<style>
:root {
  --bg: #fafaf6; --surface: #fffdf7; --surface-warm: #fef8ef;
  --fg: #2d2318; --fg-2: #5c4a38; --muted: #8c7a68; --meta: #a69682;
  --border: #e8e0d4; --border-soft: #f0eae0; --accent: #e8723c;
  --accent-on: #ffffff; --accent-hover: #f0804a; --accent-active: #d4622c;
  --font-display: "SF Pro Display","PingFang SC","SF Pro Icons","Helvetica Neue",Helvetica,Arial,sans-serif;
  --font-body: "PingFang SC","SF Pro Text","SF Pro Icons","Helvetica Neue",Helvetica,Arial,sans-serif;
  --text-xs: 12px; --text-sm: 14px; --text-base: 16px;
  --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-5: 20px; --space-6: 24px;
  --radius-sm: 8px; --radius-md: 12px; --radius-lg: 18px; --radius-pill: 980px;
  --elev-raised: 0 12px 32px rgba(0,0,0,0.06);
  --ease-standard: cubic-bezier(0.28,0,0.22,1);
  --motion-fast: 150ms; --motion-base: 220ms;
  --price-orange: #e8590c; --badge-red: #e04a3a; --community-green: #5b9a6f; --map-blue: #5b8cb8;
  --device-bg: #d8d0c4; --phone-bezel: #0a0a0a; --phone-inner: #0a0a0a;

  /* Card placeholder gradients */
  --fp-apart-a: #f5efe0; --fp-apart-b: #e8dcc8;
  --fp-room-a: #efe8f0; --fp-room-b: #ddd0e0;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body { display: grid; place-items: center; min-height: 100vh; background: var(--device-bg); font-family: var(--font-body); font-size: var(--text-base); color: var(--fg); -webkit-font-smoothing: antialiased; }

.phone-frame { width: 390px; min-width: 390px; height: 844px; background: var(--phone-bezel); border-radius: 50px; padding: 14px; box-shadow: 0 20px 60px rgba(0,0,0,0.25), 0 4px 16px rgba(0,0,0,0.1); flex-shrink: 0; }
.phone-screen { width: 100%; height: 100%; background: var(--bg); border-radius: 38px; overflow: hidden; display: flex; flex-direction: column; position: relative; }
.dynamic-island { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 126px; height: 34px; background: var(--phone-inner); border-radius: 20px; z-index: 100; }

.status-bar { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px 0; height: 50px; font-size: 14px; font-weight: 600; color: var(--fg); }
.status-time { flex: 1; }
.status-icons { display: flex; align-items: center; gap: 6px; }
.status-icons svg { width: 16px; height: 16px; }

.mp-nav { display: flex; align-items: center; height: 44px; padding: 0 12px; flex-shrink: 0; position: relative; }
.mp-nav-back { width: 32px; height: 32px; display: grid; place-items: center; border-radius: 50%; cursor: pointer; transition: background var(--motion-fast) var(--ease-standard); flex-shrink: 0; }
.mp-nav-back:active { background: var(--surface); }
.mp-nav-back svg { width: 22px; height: 22px; color: var(--fg); }
.mp-nav-title { flex: 1; text-align: center; font-family: var(--font-display); font-size: 17px; font-weight: 600; letter-spacing: -0.01em; color: var(--fg); margin-right: 32px; }

.mp-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; padding-bottom: 8px; }
.mp-scroll::-webkit-scrollbar { width: 0; }

/* Segmented tab */
.seg-tabs { display: flex; gap: 0; padding: 8px 16px; flex-shrink: 0; }
.seg-tab { flex: 1; text-align: center; padding: 8px 0; font-size: 13px; font-weight: 500; color: var(--muted); border: 1px solid var(--border); cursor: pointer; transition: all var(--motion-fast); user-select: none; }
.seg-tab:first-child { border-radius: var(--radius-pill) 0 0 var(--radius-pill); }
.seg-tab:last-child { border-radius: 0 var(--radius-pill) var(--radius-pill) 0; }
.seg-tab + .seg-tab { margin-left: -1px; }
.seg-tab.active { background: var(--accent); color: var(--accent-on); border-color: var(--accent); }

/* List */
.list { padding: 4px 16px 20px; display: flex; flex-direction: column; gap: 10px; }
.card { display: flex; gap: 12px; background: var(--surface); border: 1px solid var(--border-soft); border-radius: var(--radius-lg); padding: 12px; cursor: pointer; transition: transform var(--motion-fast); user-select: none; }
.card:active { transform: scale(0.985); }
.card-img { width: 80px; height: 64px; border-radius: var(--radius-sm); flex-shrink: 0; }
.ci-apart { background: linear-gradient(135deg, var(--fp-apart-a), var(--fp-apart-b)); }
.ci-room  { background: linear-gradient(135deg, var(--fp-room-a), var(--fp-room-b)); }
.card-info { flex: 1; min-width: 0; }
.card-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.card-meta { font-size: 12px; color: var(--muted); }
.card-price { font-size: 15px; font-weight: 600; color: var(--price-orange); flex-shrink: 0; align-self: center; }

/* Empty */
.empty { text-align: center; padding: 64px 20px; color: var(--muted); }
.empty svg { width: 48px; height: 48px; color: var(--border); margin-bottom: 12px; }
.empty p { font-size: 14px; line-height: 1.5; }
.empty .empty-btn { display: inline-block; margin-top: 12px; padding: 10px 24px; background: var(--accent); color: var(--accent-on); border-radius: var(--radius-pill); font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none; }

.toast { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); background: var(--fg); color: var(--bg); padding: 10px 20px; border-radius: var(--radius-pill); font-size: 14px; font-weight: 500; opacity: 0; pointer-events: none; transition: opacity var(--motion-base); z-index: 200; white-space: nowrap; }
.toast.show { opacity: 1; }
.home-indicator { width: 134px; height: 5px; background: var(--fg); border-radius: 3px; margin: 8px auto; opacity: 0.2; }

@media (max-width: 430px) {
  body { background: var(--bg); align-items: flex-start; }
  .phone-frame { width: 100vw; height: 100vh; height: 100dvh; min-width: unset; border-radius: 0; padding: 0; box-shadow: none; }
  .phone-screen { border-radius: 0; }
  .dynamic-island { display: none; }
  .status-bar { padding: 12px 20px 0; height: 44px; }
}
</style>
</head>
<body>

<div class="phone-frame">
  <div class="phone-screen">
    <div class="dynamic-island"></div>

    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <svg viewBox="0 0 16 12" fill="currentColor"><rect x="0" y="7" width="2" height="4" rx="0.5"/><rect x="3" y="5" width="2" height="6" rx="0.5"/><rect x="6" y="2" width="2" height="9" rx="0.5"/><rect x="9" y="0" width="2" height="11" rx="0.5"/></svg>
        <svg viewBox="0 0 18 12" fill="currentColor"><path d="M1 3.5h1.5L3.5 8h11l1-4.5H16a1 1 0 011 1v6a1 1 0 01-1 1H2a1 1 0 01-1-1v-6a1 1 0 011-1z"/><rect x="4" y="8.5" width="10" height="1.5" rx="0.5"/></svg>
        <svg viewBox="0 0 28 12" fill="currentColor"><rect x="0" y="0" width="24" height="12" rx="2.5" stroke="currentColor" fill="none" stroke-width="1"/><rect x="2" y="2" width="18" height="8" rx="1"/><rect x="25" y="3" width="2" height="6" rx="0.8"/></svg>
      </div>
    </div>

    <div class="mp-nav">
      <div class="mp-nav-back" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </div>
      <span class="mp-nav-title">我的收藏</span>
    </div>

    <div class="seg-tabs" data-od-id="fav-tabs" id="favTabs">
      <span class="seg-tab active" onclick="setTab('apartment',this)">收藏的公寓</span>
      <span class="seg-tab" onclick="setTab('room',this)">收藏的户型</span>
    </div>

    <div class="mp-scroll">
      <div class="list" id="favList"></div>
    </div>

    <div class="home-indicator"></div>
    <div class="toast" id="toast"></div>
  </div>
</div>

<script>
var apartments = [
  { type:'apartment', name:'郑东人才公寓', detail:'金水东路·¥1200-1800/月', price:'¥1200起', imgClass:'ci-apart', link:'app-detail.html?id=1' },
  { type:'apartment', name:'二七人才公寓', detail:'大学路·¥1000-1500/月', price:'¥1000起', imgClass:'ci-apart', link:'app-detail.html?id=5' }
];
var rooms = [
  { type:'room', name:'精致一居室', detail:'郑东人才公寓·35㎡·南向', price:'¥1200/月', imgClass:'ci-room', link:'app-room-detail.html?aptId=1&roomId=1' },
  { type:'room', name:'舒适两居室', detail:'郑东人才公寓·55㎡·东南向', price:'¥1500/月', imgClass:'ci-room', link:'app-room-detail.html?aptId=1&roomId=2' },
  { type:'room', name:'二七舒适两居', detail:'二七人才公寓·56㎡·南向', price:'¥1000/月', imgClass:'ci-room', link:'app-room-detail.html?aptId=5&roomId=1' }
];

var activeTab = 'apartment';

function setTab(tab, el) {
  activeTab = tab;
  var tabs = document.querySelectorAll('#favTabs .seg-tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  el.classList.add('active');
  render();
}

function render() {
  var data = activeTab === 'apartment' ? apartments : rooms;
  var container = document.getElementById('favList');
  if (data.length === 0) {
    container.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg><p>还没有收藏<br>去首页看看吧</p><a class="empty-btn" href="app-home.html">去首页</a></div>';
    return;
  }
  var html = '';
  data.forEach(function(it) {
    html += '<div class="card" onclick="openFavoriteLink(\'' + it.link + '\')">'
      + '<div class="card-img ' + it.imgClass + '"></div>'
      + '<div class="card-info"><div class="card-name">' + it.name + '</div><div class="card-meta">' + it.detail + '</div></div>'
      + '<div class="card-price">' + it.price + '</div>'
      + '</div>';
  });
  container.innerHTML = html;
}

function openFavoriteLink(link) {
  if (!requireAuth(function() { openFavoriteLink(link); })) return;
  window.location.href = link;
}

var toastTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 1800);
}
render();
</script>
<script src="auth-guard.js"></script>
<script>requireAuth(function() {});</script>
</body>
</html>
