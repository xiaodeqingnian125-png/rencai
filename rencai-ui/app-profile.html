<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>晓得青年 · 我的</title>
<style>
/* ═══════════════════════════════════════════════════════════════════════
   Warm Community palette — shared tokens
   ═══════════════════════════════════════════════════════════════════════ */
:root {
  --bg: #fafaf6;
  --surface: #fffdf7;
  --surface-warm: #fef8ef;
  --fg: #2d2318;
  --fg-2: #5c4a38;
  --muted: #8c7a68;
  --meta: #a69682;
  --border: #e8e0d4;
  --border-soft: #f0eae0;
  --accent: #e8723c;
  --accent-on: #ffffff;
  --accent-hover: #f0804a;
  --accent-active: #d4622c;

  --font-display: "SF Pro Display", "PingFang SC", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
  --font-body: "PingFang SC", "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
  --font-mono: "SF Mono", ui-monospace, "JetBrains Mono", Menlo, Monaco, Consolas, monospace;

  --text-xs: 12px;
  --text-sm: 14px;
  --text-base: 16px;
  --text-lg: 21px;

  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;

  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --radius-pill: 980px;

  --elev-raised: 0 12px 32px rgba(0,0,0,0.06);
  --ease-standard: cubic-bezier(0.28, 0, 0.22, 1);
  --motion-fast: 150ms;
  --motion-base: 220ms;

  /* Semantic */
  --price-orange: #e8590c;
  --community-green: #5b9a6f;
  --map-blue: #5b8cb8;
  --guide-plum: #9b7eb8;
  --badge-red: #e04a3a;

  /* Device frame */
  --device-bg: #d8d0c4;
  --phone-bezel: #0a0a0a;
  --phone-inner: #0a0a0a;
}

/* ═══════════════════════════════════════════════════════════════════════
   Reset & Base
   ═══════════════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  display: grid; place-items: center;
  min-height: 100vh;
  background: var(--device-bg);
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--fg);
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════════════════════════════════
   Phone Frame
   ═══════════════════════════════════════════════════════════════════════ */
.phone-frame {
  width: 390px; min-width: 390px;
  height: 844px;
  background: var(--phone-bezel);
  border-radius: 50px;
  padding: 14px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25), 0 4px 16px rgba(0,0,0,0.1);
  flex-shrink: 0;
}
.phone-screen {
  width: 100%; height: 100%;
  background: var(--bg);
  border-radius: 38px;
  overflow: hidden;
  display: flex; flex-direction: column;
  position: relative;
}
.dynamic-island {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  width: 126px; height: 34px;
  background: var(--phone-inner); border-radius: 20px;
  z-index: 100;
}

/* ═══════════════════════════════════════════════════════════════════════
   Status Bar
   ═══════════════════════════════════════════════════════════════════════ */
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 28px 0;
  height: 50px;
  font-size: 14px; font-weight: 600;
  color: var(--fg);
}
.status-time { flex: 1; }
.status-icons { display: flex; align-items: center; gap: 6px; }
.status-icons svg { width: 16px; height: 16px; }

/* ═══════════════════════════════════════════════════════════════════════
   Nav Bar
   ═══════════════════════════════════════════════════════════════════════ */
.mp-nav {
  display: flex; align-items: center; justify-content: center;
  height: 44px; padding: 0 16px;
  position: relative;
  flex-shrink: 0;
}
.mp-nav-title {
  font-family: var(--font-display);
  font-size: 17px; font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--fg);
}

/* ═══════════════════════════════════════════════════════════════════════
   Scroll Area
   ═══════════════════════════════════════════════════════════════════════ */
.mp-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
  padding-bottom: 8px;
}
.mp-scroll::-webkit-scrollbar { width: 0; }

/* ═══════════════════════════════════════════════════════════════════════
   User Header Card
   ═══════════════════════════════════════════════════════════════════════ */
.user-header {
  padding: 12px 16px 20px;
}
.user-card {
  background: var(--surface-warm);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-lg);
  padding: 20px;
  display: flex; align-items: center; gap: 16px;
}
.user-avatar {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent) 0%, color-mix(in oklab, var(--accent) 70%, var(--price-orange)) 100%);
  display: grid; place-items: center;
  font-family: var(--font-display);
  font-size: 26px; font-weight: 600;
  color: var(--accent-on);
  flex-shrink: 0;
  letter-spacing: 0.02em;
}
.user-info { flex: 1; min-width: 0; }
.user-name {
  font-family: var(--font-display);
  font-size: 20px; font-weight: 600;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}
.user-status-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--muted);
}
.user-status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--community-green);
}
.user-arrow {
  color: var(--meta);
  flex-shrink: 0;
}
.user-arrow svg { width: 18px; height: 18px; }

/* ═══════════════════════════════════════════════════════════════════════
   Menu Section
   ═══════════════════════════════════════════════════════════════════════ */
.menu-section {
  padding: 0 16px 16px;
}
.menu-group {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.menu-group + .menu-group { margin-top: 12px; }
.menu-item {
  display: flex; align-items: center; gap: 14px;
  padding: 16px;
  cursor: pointer;
  transition: background var(--motion-fast) var(--ease-standard);
  user-select: none;
  border-bottom: 1px solid var(--border-soft);
}
.menu-item:last-child { border-bottom: none; }
.menu-item:active { background: var(--surface-warm); }

.menu-icon {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  display: grid; place-items: center;
  flex-shrink: 0;
}
.menu-icon svg { width: 20px; height: 20px; }
.menu-label { flex: 1; font-size: 16px; font-weight: 500; }
.menu-badge {
  min-width: 20px; height: 20px;
  padding: 0 6px;
  border-radius: 10px;
  background: var(--badge-red);
  color: #fff;
  font-size: 11px; font-weight: 600;
  display: grid; place-items: center;
  line-height: 1;
}
.menu-arrow { color: var(--meta); }
.menu-arrow svg { width: 16px; height: 16px; }

/* Icon accent tints */
.icon-activity { background: color-mix(in oklab, var(--accent) 10%, transparent); color: var(--accent); }
.icon-post     { background: color-mix(in oklab, var(--map-blue) 10%, transparent); color: var(--map-blue); }
.icon-lend      { background: color-mix(in oklab, var(--community-green) 10%, transparent); color: var(--community-green); }
.icon-borrow    { background: color-mix(in oklab, var(--guide-plum) 10%, transparent); color: var(--guide-plum); }
.icon-order     { background: color-mix(in oklab, var(--price-orange) 10%, transparent); color: var(--price-orange); }
.icon-fav        { background: color-mix(in oklab, var(--badge-red) 10%, transparent); color: var(--badge-red); }
.icon-comment    { background: color-mix(in oklab, var(--muted) 10%, transparent); color: var(--fg-2); }
.icon-settings   { background: color-mix(in oklab, var(--muted) 10%, transparent); color: var(--fg-2); }
.icon-admin      { background: color-mix(in oklab, var(--fg-2) 10%, transparent); color: var(--fg-2); }

/* ═══════════════════════════════════════════════════════════════════════
   Admin Section
   ═══════════════════════════════════════════════════════════════════════ */
.admin-label {
  padding: 4px 16px 8px;
  font-size: 12px; font-weight: 600;
  color: var(--meta);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

/* ═══════════════════════════════════════════════════════════════════════
   TabBar
   ═══════════════════════════════════════════════════════════════════════ */
.mp-tabbar {
  display: flex; align-items: flex-start;
  padding: 6px 4px 0;
  background: color-mix(in oklab, var(--bg) 92%, transparent);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border-soft);
  flex-shrink: 0;
  position: relative;
}
.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 6px 0 8px;
  cursor: pointer;
  transition: color var(--motion-fast) var(--ease-standard);
  user-select: none;
  color: var(--meta);
}
.tab-item.active { color: var(--accent); }
.tab-item svg { width: 24px; height: 24px; }
.tab-label { font-size: 10px; font-weight: 500; letter-spacing: 0.01em; }
.tab-badge {
  position: absolute; top: 2px; right: 50%; transform: translateX(18px);
  min-width: 8px; height: 8px;
  background: var(--badge-red); border-radius: 50%;
  border: 2px solid var(--bg);
}

/* Home indicator */
.home-indicator {
  width: 134px; height: 5px;
  background: var(--fg);
  border-radius: 3px;
  margin: 8px auto;
  opacity: 0.2;
}

/* Toast */
.toast {
  position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
  background: var(--fg); color: var(--bg);
  padding: 10px 20px;
  border-radius: var(--radius-pill);
  font-size: 14px; font-weight: 500;
  opacity: 0; pointer-events: none;
  transition: opacity var(--motion-base) var(--ease-standard);
  z-index: 200;
  white-space: nowrap;
}
.toast.show { opacity: 1; }

/* ═══════════════════════════════════════════════════════════════════════
   Collapse animation
   ═══════════════════════════════════════════════════════════════════════ */
.admin-toggle-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%;
  padding: 10px 0;
  background: transparent;
  border: none;
  font-size: 13px; font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  transition: color var(--motion-fast) var(--ease-standard);
}
.admin-toggle-btn:active { color: var(--accent); }
.admin-toggle-btn svg { width: 14px; height: 14px; transition: transform var(--motion-base) var(--ease-standard); }
.admin-toggle-btn.open svg { transform: rotate(180deg); }
.admin-panel {
  max-height: 0;
  overflow: hidden;
  transition: max-height var(--motion-base) var(--ease-standard);
}
.admin-panel.show { max-height: 640px; }

/* ═══════════════════════════════════════════════════════════════════════
   Business Drawer
   ═══════════════════════════════════════════════════════════════════════ */
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(45, 35, 24, 0.28);
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--motion-base) var(--ease-standard);
  z-index: 120;
}
.overlay.show {
  opacity: 1;
  pointer-events: auto;
}
.sheet {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  max-height: 74%;
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  box-shadow: 0 -18px 48px rgba(45, 35, 24, 0.18);
  transform: translateY(104%);
  transition: transform var(--motion-base) var(--ease-standard);
  z-index: 130;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sheet.show { transform: translateY(0); }
.sheet-handle {
  width: 38px;
  height: 4px;
  border-radius: var(--radius-pill);
  background: var(--border);
  margin: 10px auto 4px;
  flex-shrink: 0;
}
.sheet-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  padding: 8px 18px 14px;
  border-bottom: 1px solid var(--border-soft);
}
.sheet-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 650;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}
.sheet-subtitle {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
}
.sheet-close {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: none;
  background: var(--surface-warm);
  color: var(--fg-2);
  display: grid;
  place-items: center;
  cursor: pointer;
  flex-shrink: 0;
}
.sheet-close svg { width: 18px; height: 18px; }
.sheet-body {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 14px 16px 20px;
}
.sheet-body::-webkit-scrollbar { width: 0; }
.record-list {
  display: grid;
  gap: 12px;
}
.record-card {
  background: var(--bg);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-lg);
  padding: 14px;
}
.record-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 8px;
}
.record-title {
  font-size: 16px;
  font-weight: 650;
  color: var(--fg);
  line-height: 1.35;
}
.record-status {
  flex-shrink: 0;
  padding: 4px 8px;
  border-radius: var(--radius-pill);
  background: color-mix(in oklab, var(--community-green) 13%, transparent);
  color: var(--community-green);
  font-size: 11px;
  font-weight: 650;
}
.record-status.warn {
  background: color-mix(in oklab, var(--price-orange) 12%, transparent);
  color: var(--price-orange);
}
.record-status.muted {
  background: color-mix(in oklab, var(--muted) 12%, transparent);
  color: var(--fg-2);
}
.record-meta {
  display: grid;
  gap: 5px;
  font-size: 13px;
  color: var(--muted);
  line-height: 1.45;
}
.record-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.record-btn {
  flex: 1;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--fg-2);
  border-radius: var(--radius-pill);
  padding: 9px 12px;
  font-size: 13px;
  font-weight: 650;
  cursor: pointer;
}
.record-btn.primary {
  border-color: var(--accent);
  background: var(--accent);
  color: var(--accent-on);
}
.empty-state {
  padding: 28px 18px;
  text-align: center;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.6;
}

/* ═══════════════════════════════════════════════════════════════════════
   Responsive
   ═══════════════════════════════════════════════════════════════════════ */
@media (max-width: 430px) {
  body { background: var(--bg); align-items: flex-start; }
  .phone-frame {
    width: 100vw; height: 100vh; height: 100dvh;
    min-width: unset;
    border-radius: 0; padding: 0;
    box-shadow: none;
  }
  .phone-screen { border-radius: 0; }
  .dynamic-island { display: none; }
  .status-bar { padding: 12px 20px 0; height: 44px; }
}
</style>
</head>

<script>
// ─── Admin Toggle ───────────────────────────────────────────────────
function toggleAdmin() {
  var panel = document.getElementById('adminPanel');
  var btn = document.getElementById('adminToggle');
  var open = panel.classList.toggle('show');
  btn.classList.toggle('open', open);
}

// ─── Toast ─────────────────────────────────────────────────────────
var toastTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 1800);
}

// ─── Business Records ───────────────────────────────────────────────
var businessConfig = {

          { label: '提醒我', action: 'remind' }
        ]
      }
    ]
  },

    subtitle: '找室友发布记录和联系状态',

    items: [
      {
        title: '郑东人才公寓 · 主卧找室友',
        status: '展示中',
        tone: 'ok',
        meta: ['类型：有房找室友', '预算：1200-1500 元/月', '最近联系：2 人咨询'],
        actions: [
          { label: '查看帖子', action: 'roommate' },
          { label: '下架帖子', action: 'closePost' }
        ]
      }

  },
  lend: {
    title: '我借出的',

    empty: '暂无借出记录。',

      {
        title: '电钻工具箱',
        status: '借出中',

        status: '待确认',
        tone: 'muted',
        meta: ['申请人：陈同学', '申请时间：明天 10:00-11:30', '留言：装窗帘用一下'],
        actions: [

          { label: '拒绝', action: 'reject' }

  },

function openBusiness(type) {
  var cfg = businessConfig[type];
  if (!cfg) return;
  document.getElementById('businessTitle').textContent = cfg.title;
  document.getElementById('businessSubtitle').textContent = cfg.subtitle;
  document.getElementById('businessBody').innerHTML = renderBusinessItems(cfg);
  document.getElementById('businessOverlay').classList.add('show');
  var sheet = document.getElementById('businessSheet');
  sheet.classList.add('show');
  sheet.setAttribute('aria-hidden', 'false');
}

function closeBusiness() {
  document.getElementById('businessOverlay').classList.remove('show');
  var sheet = document.getElementById('businessSheet');
  sheet.classList.remove('show');
  sheet.setAttribute('aria-hidden', 'true');
}

function renderBusinessItems(cfg) {
  if (!cfg.items || cfg.items.length === 0) {
    return '<div class="empty-state">' + cfg.empty + '</div>';
  }
  return '<div class="record-list">' + cfg.items.map(function(item) {
    var statusClass = item.tone === 'warn' ? 'warn' : item.tone === 'muted' ? 'muted' : '';
    var meta = item.meta.map(function(line) {
      return '<div>' + line + '</div>';
    }).join('');
    var actions = item.actions.map(function(action) {
      var primary = action.action.indexOf('cancel') === -1 && action.action.indexOf('reject') === -1 ? ' primary' : '';
      return '<button class="record-btn' + primary + '" type="button" onclick="handleBusinessAction(&quot;' + action.action + '&quot;)">' + action.label + '</button>';
    }).join('');
    return '<article class="record-card">' +
      '<div class="record-top">' +
        '<div class="record-title">' + item.title + '</div>' +
        '<span class="record-status ' + statusClass + '">' + item.status + '</span>' +
      '</div>' +
      '<div class="record-meta">' + meta + '</div>' +
      '<div class="record-actions">' + actions + '</div>' +
    '</article>';
  }).join('') + '</div>';
}

function handleBusinessAction(action) {
  var routeMap = {
    service: 'app-service.html',
    roommate: 'app-roommate.html',
    borrowPage: 'app-borrow.html',
    comment: 'app-my-comments.html'
  };
  if (routeMap[action]) {
    window.location.href = routeMap[action];
    return;
  }
  var messageMap = {
    cancelActivity: '已提交取消报名',
    remind: '已开启候补提醒',
    closePost: '帖子已下架',
    contact: '已为你打开联系入口',
    finishLend: '已确认归还',
    approveLend: '已同意借出',
    reject: '已拒绝申请'
  };
  showToast(messageMap[action] || '操作已提交');
}

// ─── Tab ───────────────────────────────────────────────────────────
function switchTab(el, name) {
  if (el.classList.contains('active')) return;
  var tabs = document.querySelectorAll('.tab-item');
  for (var i = 0; i < tabs.length; i++) { tabs[i].classList.remove('active'); }
  el.classList.add('active');
  if (name === '首页') { window.location.href = 'app-home.html'; return; }
  if (name === '服务') { window.location.href = 'app-service.html'; return; }
  if (name === '借个锤子') { window.location.href = 'app-borrow.html'; return; }
  if (name === '消息') { window.location.href = 'app-messages.html'; return; }
  showToast(name + ' — 即将开放');
}
</script>
