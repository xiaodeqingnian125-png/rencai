<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>晓得青年 · 用户管理</title><link rel="stylesheet" href="admin-shared.css"></head>
<body><div class="phone-frame"><div class="phone-screen">
  <div class="dynamic-island"></div><div class="status-bar"><span>9:41</span><div class="status-icons"><svg viewBox="0 0 16 12" fill="currentColor"><rect x="0" y="7" width="2" height="4" rx="0.5"/><rect x="3" y="5" width="2" height="6" rx="0.5"/><rect x="6" y="2" width="2" height="9" rx="0.5"/><rect x="9" y="0" width="2" height="11" rx="0.5"/></svg><svg viewBox="0 0 28 12" fill="currentColor"><rect x="0" y="0" width="24" height="12" rx="2.5" stroke="currentColor" fill="none" stroke-width="1"/><rect x="2" y="2" width="18" height="8" rx="1"/></svg></div></div>
  <div class="mp-nav"><div class="mp-nav-back" onclick="history.back()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></div><span class="mp-nav-title">用户管理</span></div>
  <div class="toolbar"><div class="search-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg><input id="searchInput" placeholder="搜索姓名/公寓/手机号" oninput="render()"></div><button class="btn-add" onclick="openForm(null)">+ 新增</button></div>
  <div class="filter-row"><button class="filter-chip active" onclick="setFilter('all', this)">全部</button><button class="filter-chip" onclick="setFilter('pending', this)">待认证</button><button class="filter-chip" onclick="setFilter('active', this)">正常</button><button class="filter-chip" onclick="setFilter('disabled', this)">停用</button></div>
  <div class="summary-grid" id="summary"></div><div class="mp-scroll"><div class="list" id="list"></div></div>
  <div class="modal-mask" id="formMask" onclick="closeForm(event)"><div class="modal-card" onclick="event.stopPropagation()"><div class="modal-title" id="formTitle">新增用户</div><div id="fieldBox"></div><div class="modal-actions"><button class="modal-btn btn-cancel" onclick="closeForm()">取消</button><button class="modal-btn btn-delete" id="btnDelete" style="display:none" onclick="deleteItem()">删除</button><button class="modal-btn btn-confirm" onclick="saveItem()">保存</button></div></div></div>
  <div class="modal-mask" id="deleteMask" onclick="closeDelete(event)"><div class="modal-card" onclick="event.stopPropagation()"><div class="modal-title">确认删除</div><p style="text-align:center;font-size:14px;color:var(--muted);margin-bottom:16px;">确定删除这个用户吗？</p><div class="modal-actions"><button class="modal-btn btn-cancel" onclick="closeDelete()">取消</button><button class="modal-btn btn-delete" onclick="confirmDelete()">确认删除</button></div></div></div>
  <div class="home-indicator"></div><div class="toast" id="toast"></div>
</div></div>
<script>
var pageConfig={addTitle:'新增用户',editTitle:'编辑用户',requiredKey:'name',requiredLabel:'用户姓名',defaultStatus:'pending',fields:[
  {key:'name',label:'用户姓名',placeholder:'如：陈同学'},
  {key:'phone',label:'手机号',placeholder:'如：138****2688'},
  {key:'apartment',label:'所在公寓',placeholder:'如：郑东人才公寓'},
  {key:'room',label:'房间号',placeholder:'如：3-1202'},
  {key:'role',label:'身份',placeholder:'住户 / 管家 / 管理员'},
  {key:'note',label:'备注',placeholder:'认证材料、入住状态、风险备注',type:'textarea'}
]};
var data=[
  {id:1,name:'陈同学',phone:'138****2688',apartment:'郑东人才公寓',room:'3-1202',role:'住户',note:'已入住，认证材料完整。',status:'active'},
  {id:2,name:'林同学',phone:'156****9012',apartment:'高新人才家园',room:'2-803',role:'住户',note:'等待上传劳动合同或人才码。',status:'pending'},
  {id:3,name:'管家小周',phone:'177****3321',apartment:'中原青年社区',room:'服务中心',role:'管家',note:'负责服务订单和维修派单。',status:'active'}
];
var nextId=4;
function renderItem(item){var s=statusInfo(item.status);return '<div class="item"><div class="item-header"><div><div class="item-name">'+escapeHtml(item.name)+'</div><div class="item-meta">'+escapeHtml(item.phone)+' · '+escapeHtml(item.role)+'</div></div><span class="status '+s[1]+'">'+s[0]+'</span></div><div class="item-desc">'+escapeHtml(item.apartment)+' · '+escapeHtml(item.room)+'<br>'+escapeHtml(item.note)+'</div><div class="item-actions"><button class="btn-sm primary" onclick="openForm('+item.id+')">编辑</button><button class="btn-sm" onclick="updateStatus('+item.id+',&quot;active&quot;,&quot;用户已认证&quot;)">认证通过</button><button class="btn-sm" onclick="updateStatus('+item.id+',&quot;disabled&quot;,&quot;用户已停用&quot;)">停用</button><button class="btn-sm danger" onclick="removeItem('+item.id+')">删除</button></div></div>';}
</script><script src="admin-shared.js"></script></body></html>
