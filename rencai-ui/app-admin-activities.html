<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>晓得青年 · 活动管理</title>
<link rel="stylesheet" href="admin-shared.css">
</head>
<body>
<div class="phone-frame"><div class="phone-screen">
  <div class="dynamic-island"></div>
  <div class="status-bar"><span>9:41</span><div class="status-icons"><svg viewBox="0 0 16 12" fill="currentColor"><rect x="0" y="7" width="2" height="4" rx="0.5"/><rect x="3" y="5" width="2" height="6" rx="0.5"/><rect x="6" y="2" width="2" height="9" rx="0.5"/><rect x="9" y="0" width="2" height="11" rx="0.5"/></svg><svg viewBox="0 0 28 12" fill="currentColor"><rect x="0" y="0" width="24" height="12" rx="2.5" stroke="currentColor" fill="none" stroke-width="1"/><rect x="2" y="2" width="18" height="8" rx="1"/></svg></div></div>
  <div class="mp-nav"><div class="mp-nav-back" onclick="history.back()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></div><span class="mp-nav-title">活动管理</span></div>
  <div class="toolbar"><div class="search-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg><input id="searchInput" placeholder="搜索活动/地点" oninput="render()"></div><button class="btn-add" onclick="openForm(null)">+ 新增</button></div>
  <div class="filter-row"><button class="filter-chip active" onclick="setFilter('all', this)">全部</button><button class="filter-chip" onclick="setFilter('pending', this)">待审核</button><button class="filter-chip" onclick="setFilter('active', this)">已上线</button><button class="filter-chip" onclick="setFilter('hidden', this)">隐藏</button></div>
  <div class="summary-grid" id="summary"></div>
  <div class="mp-scroll"><div class="list" id="list"></div></div>
  <div class="modal-mask" id="formMask" onclick="closeForm(event)"><div class="modal-card" onclick="event.stopPropagation()"><div class="modal-title" id="formTitle">新增活动</div><div id="fieldBox"></div><div class="modal-actions"><button class="modal-btn btn-cancel" onclick="closeForm()">取消</button><button class="modal-btn btn-delete" id="btnDelete" style="display:none" onclick="deleteItem()">删除</button><button class="modal-btn btn-confirm" onclick="saveItem()">保存</button></div></div></div>
  <div class="modal-mask" id="deleteMask" onclick="closeDelete(event)"><div class="modal-card" onclick="event.stopPropagation()"><div class="modal-title">确认删除</div><p style="text-align:center;font-size:14px;color:var(--muted);margin-bottom:16px;">删除后不可恢复，确定删除这条活动吗？</p><div class="modal-actions"><button class="modal-btn btn-cancel" onclick="closeDelete()">取消</button><button class="modal-btn btn-delete" onclick="confirmDelete()">确认删除</button></div></div></div>
  <div class="home-indicator"></div><div class="toast" id="toast"></div>
</div></div>
<script>
var pageConfig = { addTitle:'新增活动', editTitle:'编辑活动', requiredKey:'name', requiredLabel:'活动名称', defaultStatus:'pending', fields:[
  {key:'name', label:'活动名称', placeholder:'如：周末羽毛球搭子局'},
  {key:'category', label:'活动类型', placeholder:'运动 / 公益 / 兴趣 / 分享'},
  {key:'time', label:'活动时间', placeholder:'如：本周六 15:00'},
  {key:'place', label:'地点', placeholder:'如：郑东人才公寓活动室'},
  {key:'quota', label:'人数限制', placeholder:'如：12人'},
  {key:'owner', label:'发起人', placeholder:'如：小李'},
  {key:'desc', label:'活动说明', placeholder:'报名条件、费用、注意事项', type:'textarea'}
]};
var data = [
  {id:1,name:'周末羽毛球搭子局',category:'运动',time:'周六 15:00',place:'郑东人才公寓活动室',quota:'12人',owner:'小李',desc:'自带球拍，社区提供场地。',status:'pending'},
  {id:2,name:'青年租房避坑分享',category:'分享',time:'周三 19:30',place:'线上直播',quota:'不限',owner:'运营小晓',desc:'围绕合同、押金和维修责任做经验分享。',status:'active'},
  {id:3,name:'社区公益清洁日',category:'公益',time:'7月6日 09:00',place:'中原青年社区',quota:'20人',owner:'社区管家',desc:'报名后统一发放工具和手套。',status:'hidden'}
];
var nextId = 4;
function renderItem(item){var s=statusInfo(item.status);return '<div class="item"><div class="item-header"><div><div class="item-name">'+escapeHtml(item.name)+'</div><div class="item-meta">'+escapeHtml(item.category)+' · '+escapeHtml(item.time)+' · '+escapeHtml(item.place)+'</div></div><span class="status '+s[1]+'">'+s[0]+'</span></div><div class="item-desc">'+escapeHtml(item.desc)+'<br>人数：'+escapeHtml(item.quota)+' · 发起人：'+escapeHtml(item.owner)+'</div><div class="item-actions"><button class="btn-sm primary" onclick="openForm('+item.id+')">编辑</button><button class="btn-sm" onclick="updateStatus('+item.id+',&quot;active&quot;,&quot;活动已上线&quot;)">通过</button><button class="btn-sm" onclick="updateStatus('+item.id+',&quot;hidden&quot;,&quot;活动已隐藏&quot;)">隐藏</button><button class="btn-sm danger" onclick="removeItem('+item.id+')">删除</button></div></div>';}
</script>
<script src="admin-shared.js"></script>
</body>
</html>
