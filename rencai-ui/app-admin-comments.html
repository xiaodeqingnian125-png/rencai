<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>晓得青年 · 评论管理</title><link rel="stylesheet" href="admin-shared.css"></head>
<body><div class="phone-frame"><div class="phone-screen">
  <div class="dynamic-island"></div><div class="status-bar"><span>9:41</span><div class="status-icons"><svg viewBox="0 0 16 12" fill="currentColor"><rect x="0" y="7" width="2" height="4" rx="0.5"/><rect x="3" y="5" width="2" height="6" rx="0.5"/><rect x="6" y="2" width="2" height="9" rx="0.5"/><rect x="9" y="0" width="2" height="11" rx="0.5"/></svg><svg viewBox="0 0 28 12" fill="currentColor"><rect x="0" y="0" width="24" height="12" rx="2.5" stroke="currentColor" fill="none" stroke-width="1"/><rect x="2" y="2" width="18" height="8" rx="1"/></svg></div></div>
  <div class="mp-nav"><div class="mp-nav-back" onclick="history.back()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></div><span class="mp-nav-title">评论管理</span></div>
  <div class="toolbar"><div class="search-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg><input id="searchInput" placeholder="搜索评论/用户" oninput="render()"></div><button class="btn-add" onclick="openForm(null)">+ 新增</button></div>
  <div class="filter-row"><button class="filter-chip active" onclick="setFilter('all', this)">全部</button><button class="filter-chip" onclick="setFilter('pending', this)">待审核</button><button class="filter-chip" onclick="setFilter('active', this)">已展示</button><button class="filter-chip" onclick="setFilter('hidden', this)">已隐藏</button></div>
  <div class="summary-grid" id="summary"></div><div class="mp-scroll"><div class="list" id="list"></div></div>
  <div class="modal-mask" id="formMask" onclick="closeForm(event)"><div class="modal-card" onclick="event.stopPropagation()"><div class="modal-title" id="formTitle">新增评论</div><div id="fieldBox"></div><div class="modal-actions"><button class="modal-btn btn-cancel" onclick="closeForm()">取消</button><button class="modal-btn btn-delete" id="btnDelete" style="display:none" onclick="deleteItem()">删除</button><button class="modal-btn btn-confirm" onclick="saveItem()">保存</button></div></div></div>
  <div class="modal-mask" id="deleteMask" onclick="closeDelete(event)"><div class="modal-card" onclick="event.stopPropagation()"><div class="modal-title">确认删除</div><p style="text-align:center;font-size:14px;color:var(--muted);margin-bottom:16px;">确定删除这条评论吗？</p><div class="modal-actions"><button class="modal-btn btn-cancel" onclick="closeDelete()">取消</button><button class="modal-btn btn-delete" onclick="confirmDelete()">确认删除</button></div></div></div>
  <div class="home-indicator"></div><div class="toast" id="toast"></div>
</div></div>
<script>
var pageConfig={addTitle:'新增评论',editTitle:'编辑评论',requiredKey:'content',requiredLabel:'评论内容',defaultStatus:'pending',fields:[
  {key:'target',label:'评论对象',placeholder:'如：郑东人才公寓 / 精致一居室'},
  {key:'user',label:'用户',placeholder:'如：周同学'},
  {key:'rating',label:'评分',placeholder:'如：4.8'},
  {key:'tags',label:'标签',placeholder:'如：交通方便、管家响应快'},
  {key:'content',label:'评论内容',placeholder:'用户评价正文',type:'textarea'}
]};
var data=[
  {id:1,target:'郑东人才公寓',user:'周同学',rating:'4.8',tags:'交通方便、管家响应快',content:'离地铁站近，房间采光不错，维修反馈也比较及时。',status:'active'},
  {id:2,target:'精致一居室',user:'林同学',rating:'4.5',tags:'户型紧凑、性价比高',content:'一个人住刚好，收纳空间如果再多一点会更好。',status:'pending'},
  {id:3,target:'高新人才家园',user:'匿名用户',rating:'3.2',tags:'噪音反馈',content:'临街房间晚上略吵，建议看房时注意楼栋位置。',status:'hidden'}
];
var nextId=4;
function renderItem(item){var s=statusInfo(item.status);return '<div class="item"><div class="item-header"><div><div class="item-name">'+escapeHtml(item.target)+'</div><div class="item-meta">'+escapeHtml(item.user)+' · 评分 '+escapeHtml(item.rating)+' · '+escapeHtml(item.tags)+'</div></div><span class="status '+s[1]+'">'+s[0]+'</span></div><div class="item-desc">'+escapeHtml(item.content)+'</div><div class="item-actions"><button class="btn-sm primary" onclick="openForm('+item.id+')">编辑</button><button class="btn-sm" onclick="updateStatus('+item.id+',&quot;active&quot;,&quot;评论已展示&quot;)">展示</button><button class="btn-sm" onclick="updateStatus('+item.id+',&quot;hidden&quot;,&quot;评论已隐藏&quot;)">隐藏</button><button class="btn-sm danger" onclick="removeItem('+item.id+')">删除</button></div></div>';}
</script><script src="admin-shared.js"></script></body></html>
